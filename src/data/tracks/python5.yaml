      - name: LeetCode 1143 · Longest Common Subsequence
        obj: 'Implement `def longest_common_subsequence(text1, text2):` using a 2D DP table where `dp[i][j]` is the LCS length of `text1[:i]` and `text2[:j]`. Read two strings, print the LCS length.'
        example:
          in:
            - abcde
            - ace
          out: |
            3
        sol: |-
          def longest_common_subsequence(text1, text2):
              m, n = len(text1), len(text2)
              dp = [[0] * (n + 1) for _ in range(m + 1)]
              for i in range(1, m + 1):
                  for j in range(1, n + 1):
                      if text1[i - 1] == text2[j - 1]:
                          dp[i][j] = dp[i - 1][j - 1] + 1
                      else:
                          dp[i][j] = max(dp[i - 1][j], dp[i][j - 1])
              return dp[m][n]
          a = input()
          b = input()
          print(longest_common_subsequence(a, b))
        max: 13/1
        tests:
          - in:
              - abcde
              - ace
            exp: |
              3
          - in:
              - abc
              - def
            exp: |
              0
      - name: LeetCode 200 · Number of Islands
        obj: 'Implement `def num_islands(grid):` counting the number of islands (4-directionally connected groups of `"1"`s) in a 2D grid of `"1"`/`"0"` strings, using DFS to flood-fill and sink each island once found. Read rows, columns, then the grid, and print the count.'
        example:
          in:
            - 4
            - 5
            - '11110'
            - '11010'
            - '11000'
            - '00000'
          out: |
            1
        sol: |-
          def num_islands(grid):
              rows, cols = len(grid), len(grid[0])
              count = 0
              def sink(r, c):
                  if r < 0 or r >= rows or c < 0 or c >= cols or grid[r][c] != "1":
                      return
                  grid[r][c] = "0"
                  sink(r + 1, c)
                  sink(r - 1, c)
                  sink(r, c + 1)
                  sink(r, c - 1)
              for r in range(rows):
                  for c in range(cols):
                      if grid[r][c] == "1":
                          count += 1
                          sink(r, c)
              return count
          rows = int(input())
          cols = int(input())
          grid = [list(input()) for _ in range(rows)]
          print(num_islands(grid))
        max: 21/1
        tests:
          - in:
              - 4
              - 5
              - '11110'
              - '11010'
              - '11000'
              - '00000'
            exp: |
              1
          - in:
              - 4
              - 5
              - '11000'
              - '11000'
              - '00100'
              - '00011'
            exp: |
              3
      - name: LeetCode 79 · Word Search
        obj: 'Implement `def exist(board, word):` returning `True` if `word` can be built from adjacent cells (4-directionally, no cell reused) in a 2D letter grid, using backtracking with a temporary "visited" marker. Read rows, columns, the grid, and the word; print the result.'
        example:
          in:
            - 3
            - 4
            - ABCE
            - SFCS
            - ADEE
            - ABCCED
          out: |
            True
        sol: |-
          def exist(board, word):
              rows, cols = len(board), len(board[0])
              def backtrack(r, c, i):
                  if i == len(word):
                      return True
                  if r < 0 or r >= rows or c < 0 or c >= cols or board[r][c] != word[i]:
                      return False
                  temp = board[r][c]
                  board[r][c] = "#"
                  found = (backtrack(r + 1, c, i + 1) or backtrack(r - 1, c, i + 1) or
                           backtrack(r, c + 1, i + 1) or backtrack(r, c - 1, i + 1))
                  board[r][c] = temp
                  return found
              for r in range(rows):
                  for c in range(cols):
                      if backtrack(r, c, 0):
                          return True
              return False
          rows = int(input())
          cols = int(input())
          board = [list(input()) for _ in range(rows)]
          word = input()
          print(exist(board, word))
        max: 23/1
        tests:
          - in:
              - 3
              - 4
              - ABCE
              - SFCS
              - ADEE
              - ABCCED
            exp: |
              True
          - in:
              - 3
              - 4
              - ABCE
              - SFCS
              - ADEE
              - ABCB
            exp: |
              False
      - name: LeetCode 146 · LRU Cache
        obj: 'Implement `class LRUCache:` with `__init__(self, capacity)`, `get(self, key)`, and `put(self, key, value)`, achieving O(1) time for both using a hash map plus a doubly linked list to track recency, evicting the least-recently-used entry when over capacity. Run `put(1,1)`, `put(2,2)`, `get(1)`, `put(3,3)` (evicts key 2), `get(2)`, `put(4,4)` (evicts key 1), `get(1)`, `get(3)`, `get(4)`, printing each `get` result.'
        example:
          in: []
          out: |
            1
            -1
            -1
            3
            4
        sol: |-
          class Node:
              def __init__(self, key=0, value=0):
                  self.key = key
                  self.value = value
                  self.prev = None
                  self.next = None

          class LRUCache:
              def __init__(self, capacity):
                  self.capacity = capacity
                  self.cache = {}
                  self.head = Node()
                  self.tail = Node()
                  self.head.next = self.tail
                  self.tail.prev = self.head

              def _remove(self, node):
                  node.prev.next = node.next
                  node.next.prev = node.prev

              def _add_front(self, node):
                  node.next = self.head.next
                  node.prev = self.head
                  self.head.next.prev = node
                  self.head.next = node

              def get(self, key):
                  if key not in self.cache:
                      return -1
                  node = self.cache[key]
                  self._remove(node)
                  self._add_front(node)
                  return node.value

              def put(self, key, value):
                  if key in self.cache:
                      self._remove(self.cache[key])
                  node = Node(key, value)
                  self.cache[key] = node
                  self._add_front(node)
                  if len(self.cache) > self.capacity:
                      lru = self.tail.prev
                      self._remove(lru)
                      del self.cache[lru.key]

          cache = LRUCache(2)
          cache.put(1, 1)
          cache.put(2, 2)
          print(cache.get(1))
          cache.put(3, 3)
          print(cache.get(2))
          cache.put(4, 4)
          print(cache.get(1))
          print(cache.get(3))
          print(cache.get(4))
        max: 49/1
        tests:
          - |
            1
            -1
            -1
            3
            4
      - name: LeetCode 53 · Maximum Subarray
        obj: 'Implement `def max_subarray(nums):` returning the largest sum of any contiguous non-empty subarray, using Kadane''s algorithm in O(n). Read the array and print the result.'
        example:
          in:
            - -2 1 -3 4 -1 2 1 -5 4
          out: |
