        viz: dp
        obj: 'Implement `def fib_memo(n, memo=None):` computing the nth Fibonacci number using top-down memoization (cache previously computed results in a dict to avoid recomputation). Test with `n = 30` and print the result.'
        hint: 'Before computing `fib_memo(n)`, check if it''s already in `memo`. If so, return the cached value instantly instead of recursing again.'
        expl: 'Memoization caches the results of expensive recursive calls, turning an exponential-time naive recursion (like plain Fibonacci) into linear time by never solving the same subproblem twice.'
        sol: |-
          def fib_memo(n, memo=None):
              if memo is None:
                  memo = {}
              if n in memo:
                  return memo[n]
              if n <= 1:
                  return n
              memo[n] = fib_memo(n - 1, memo) + fib_memo(n - 2, memo)
              return memo[n]
          print(fib_memo(30))
