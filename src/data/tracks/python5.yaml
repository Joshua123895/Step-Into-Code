      - name: LeetCode 72 · Edit Distance
        obj: 'Implement `def edit_distance(a, b):` returning the minimum number of insert, delete, or replace operations to turn `a` into `b` (Levenshtein distance) using 2D DP. Read the two words on separate lines, print the distance.'
        example:
          in:
            - horse
            - ros
          out: |
            3
        sol: |-
          def edit_distance(a, b):
              m, n = len(a), len(b)
              dp = [[0] * (n + 1) for _ in range(m + 1)]
              for i in range(m + 1):
                  dp[i][0] = i
              for j in range(n + 1):
                  dp[0][j] = j
              for i in range(1, m + 1):
                  for j in range(1, n + 1):
                      if a[i - 1] == b[j - 1]:
                          dp[i][j] = dp[i - 1][j - 1]
                      else:
                          dp[i][j] = 1 + min(dp[i - 1][j], dp[i][j - 1], dp[i - 1][j - 1])
              return dp[m][n]
          a = input()
          b = input()
          print(edit_distance(a, b))
        max: 18/1
        tests:
          - in:
              - horse
              - ros
            exp: |
              3
          - in:
              - intention
              - execution
            exp: |
              5
      - name: LeetCode 416 · Partition Equal Subset Sum
        obj: 'Implement `def can_partition(nums):` returning whether the array can be split into two subsets with equal sum (a subset-sum DP). Read the array, print True or False.'
        example:
          in:
            - 1 5 11 5
          out: |
            True
        sol: |-
          def can_partition(nums):
              total = sum(nums)
              if total % 2 != 0:
                  return False
              target = total // 2
              dp = [False] * (target + 1)
              dp[0] = True
              for x in nums:
                  for s in range(target, x - 1, -1):
                      if dp[s - x]:
                          dp[s] = True
              return dp[target]
          nums = list(map(int, input().split()))
          print(can_partition(nums))
        max: 16/1
        tests:
          - in: 1 5 11 5
            exp: |
              True
          - in: 1 2 3 5
            exp: |
              False
      - name: LeetCode 875 · Koko Eating Bananas
        obj: 'Implement `def min_speed(piles, h):` returning the minimum integer eating speed so Koko finishes all banana piles within `h` hours, using binary search on the answer. Read the piles on the first line and `h` on the second, print the speed.'
        example:
          in:
            - 3 6 7 11
            - 8
          out: |
            4
        sol: |-
          import math
          def min_speed(piles, h):
              lo, hi = 1, max(piles)
              while lo < hi:
                  mid = (lo + hi) // 2
                  hours = sum(math.ceil(p / mid) for p in piles)
                  if hours <= h:
                      hi = mid
                  else:
                      lo = mid + 1
              return lo
          piles = list(map(int, input().split()))
          h = int(input())
          print(min_speed(piles, h))
        max: 16/1
        tests:
          - in:
              - 3 6 7 11
              - 8
            exp: |
              4
          - in:
              - 30 11 23 4 20
              - 6
            exp: |
              23
      - name: LeetCode 239 · Sliding Window Maximum
        obj: 'Implement `def max_sliding_window(nums, k):` returning the maximum of each size-`k` window as it slides across the array, in O(n) using a monotonic deque of indices. Read the array on the first line and `k` on the second, print the list of maxima.'
        example:
          in:
            - 1 3 -1 -3 5 3 6 7
            - 3
          out: |
            [3, 3, 5, 5, 6, 7]
        sol: |-
          from collections import deque
          def max_sliding_window(nums, k):
              dq = deque()
              result = []
              for i, x in enumerate(nums):
                  while dq and nums[dq[-1]] <= x:
                      dq.pop()
                  dq.append(i)
                  if dq[0] <= i - k:
                      dq.popleft()
                  if i >= k - 1:
                      result.append(nums[dq[0]])
              return result
          nums = list(map(int, input().split()))
          k = int(input())
          print(max_sliding_window(nums, k))
        max: 18/1
        tests:
          - in:
              - 1 3 -1 -3 5 3 6 7
              - 3
            exp: |
              [3, 3, 5, 5, 6, 7]
          - in:
              - 9 11
              - 2
            exp: |
              [11]
      - name: LeetCode 84 · Largest Rectangle in Histogram
        obj: 'Implement `def largest_rectangle(heights):` returning the area of the largest rectangle that fits under a histogram, in O(n) using a monotonic stack. Read the bar heights, print the area.'
        example:
          in:
            - 2 1 5 6 2 3
          out: |
            10
        sol: |-
          def largest_rectangle(heights):
              stack = []
              best = 0
              for i, h in enumerate(heights + [0]):
                  while stack and heights[stack[-1]] >= h:
                      height = heights[stack.pop()]
                      width = i if not stack else i - stack[-1] - 1
                      best = max(best, height * width)
                  stack.append(i)
              return best
          heights = list(map(int, input().split()))
          print(largest_rectangle(heights))
        max: 14/1
        tests:
          - in: 2 1 5 6 2 3
            exp: |
              10
          - in: 2 4
            exp: |
              4
      - name: LeetCode 4 · Median of Two Sorted Arrays
        obj: 'Implement `def find_median(a, b):` returning the median of two sorted arrays as a float. Read the first array on line one and the second on line two, print the median.'
        example:
          in:
            - 1 2
            - 3 4
          out: |
            2.5
        sol: |-
          def find_median(a, b):
              merged = sorted(a + b)
              n = len(merged)
              if n % 2 == 1:
                  return float(merged[n // 2])
              return (merged[n // 2 - 1] + merged[n // 2]) / 2
          a = list(map(int, input().split()))
          b = list(map(int, input().split()))
          print(find_median(a, b))
        max: 12/1
        tests:
          - in:
              - 1 3
              - 2
            exp: |
              2.0
          - in:
              - 1 2
              - 3 4
            exp: |
              2.5
      - name: LeetCode 45 · Jump Game II
        obj: 'Implement `def jump(nums):` returning the minimum number of jumps to reach the last index, where `nums[i]` is the maximum jump length from index `i`, using a greedy level-by-level scan. Read the array, print the minimum jumps.'
        example:
          in:
            - 2 3 1 1 4
          out: |
            2
        sol: |-
          def jump(nums):
              jumps = 0
              cur_end = 0
              farthest = 0
              for i in range(len(nums) - 1):
                  farthest = max(farthest, i + nums[i])
                  if i == cur_end:
                      jumps += 1
                      cur_end = farthest
              return jumps
          nums = list(map(int, input().split()))
          print(jump(nums))
        max: 14/1
        tests:
          - in: 2 3 1 1 4
            exp: |
              2
          - in: 2 3 0 1 4
            exp: |
              2
