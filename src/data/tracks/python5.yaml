        viz: graph_algo
        obj: 'Implement `def dijkstra(graph, start):` finding shortest distances from `start` to every node in a weighted graph (adjacency dict of `node: [(neighbor, weight), ...]`), using a min-heap (`heapq`) to always expand the closest unvisited node next. Use `graph = {"a": [("b", 4), ("c", 1)], "b": [("d", 1)], "c": [("b", 2), ("d", 5)], "d": []}` starting from `"a"`, and print the distances dict sorted by key.'
        hint: 'Always expand the unvisited node with the smallest known distance — that''s what popping from the min-heap gives you for free. Relax each neighbor: if going through the current node is shorter, update its distance and push it.'
        expl: 'Dijkstra''s algorithm finds shortest paths in a weighted graph by always greedily expanding the closest known node next, using a min-heap to efficiently find that node each step.'
        sol: |-
          import heapq
          def dijkstra(graph, start):
              distances = {node: float("inf") for node in graph}
              distances[start] = 0
              heap = [(0, start)]
              while heap:
                  dist, node = heapq.heappop(heap)
                  if dist > distances[node]:
                      continue
                  for neighbor, weight in graph[node]:
                      new_dist = dist + weight
                      if new_dist < distances[neighbor]:
                          distances[neighbor] = new_dist
                          heapq.heappush(heap, (new_dist, neighbor))
              return distances
          graph = {"a": [("b", 4), ("c", 1)], "b": [("d", 1)], "c": [("b", 2), ("d", 5)], "d": []}
          result = dijkstra(graph, "a")
