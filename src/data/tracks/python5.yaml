        obj: 'Given elevation heights, implement `def trap(height):` computing total trapped rainwater using two pointers that track the max height seen so far from each side. Read the heights, print the result.'
        example:
          in:
            - 0 1 0 2 1 0 1 3 2 1 2 1
          out: |
            6
        sol: |-
          def trap(height):
              left, right = 0, len(height) - 1
              left_max, right_max = 0, 0
              total = 0
              while left < right:
                  if height[left] < height[right]:
                      if height[left] >= left_max:
                          left_max = height[left]
                      else:
                          total += left_max - height[left]
                      left += 1
                  else:
                      if height[right] >= right_max:
                          right_max = height[right]
                      else:
                          total += right_max - height[right]
                      right -= 1
              return total
          heights = list(map(int, input().split()))
          print(trap(heights))
