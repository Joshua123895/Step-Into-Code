        sol: |-
          def subsets(nums):
              result = []
              def backtrack(index, current):
                  if index == len(nums):
                      result.append(current[:])
                      return
                  backtrack(index + 1, current)
                  current.append(nums[index])
                  backtrack(index + 1, current)
                  current.pop()
              backtrack(0, [])
              return result
          print(subsets([1, 2, 3]))
