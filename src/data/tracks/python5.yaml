        obj: 'Implement `def rob(nums):` returning the maximum total you can rob from houses in a line without robbing two adjacent houses (classic 1D DP). Read the array, print the result.'
        example:
          in:
            - 2 7 9 3 1
          out: |
            12
        sol: |-
          def rob(nums):
              prev = curr = 0
              for x in nums:
                  prev, curr = curr, max(curr, prev + x)
              return curr
          nums = list(map(int, input().split()))
          print(rob(nums))
