        sol: |-
          def total_n_queens(n):
              count = 0
              cols = set()
              diag1 = set()
              diag2 = set()
              def backtrack(row):
                  nonlocal count
                  if row == n:
                      count += 1
                      return
                  for col in range(n):
                      if col in cols or (row - col) in diag1 or (row + col) in diag2:
                          continue
                      cols.add(col)
                      diag1.add(row - col)
                      diag2.add(row + col)
                      backtrack(row + 1)
                      cols.remove(col)
                      diag1.remove(row - col)
                      diag2.remove(row + col)
              backtrack(0)
              return count
          n = int(input())
          print(total_n_queens(n))
