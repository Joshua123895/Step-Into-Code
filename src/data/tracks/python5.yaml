name: Algorithm Design & Patterns
slug: algorithms
icon: algorithm
desc: 'Master algorithmic thinking: complexity analysis, searching, sorting, core patterns, and the paradigms (DP, greedy, backtracking) behind solving real interview-style problems.'
difficulty: 3
chapters:
  - name: Foundations
    icon: graph
    levels:
      - name: Big O Analysis
        obj: 'Implement `def linear_sum(arr):` (a single loop over `arr`) and `def count_pairs(arr):` (a loop nested inside another). Test both with `[1, 2, 3, 4]`, printing each result immediately followed by its time complexity as a string: `"O(n)"` or `"O(n^2)"`.'
        hint: 'A single loop over n items is O(n). A loop nested inside another loop, each running n times, is O(n^2) — nested loops multiply their costs.'
        expl: 'Big O describes how runtime grows with input size. `linear_sum` touches each element once, so it''s O(n). `count_pairs` has a loop inside a loop, each of length n, so it''s O(n^2). Recognizing these shapes is the first step to reasoning about efficiency.'
        sol: |-
          def linear_sum(arr):
              total = 0
              for x in arr:
                  total += x
              return total

          def count_pairs(arr):
              count = 0
              for i in range(len(arr)):
                  for j in range(len(arr)):
                      count += 1
              return count

          nums = [1, 2, 3, 4]
          print(linear_sum(nums))
          print("O(n)")
          print(count_pairs(nums))
          print("O(n^2)")
        start: ''
        max: 16/1
        tests:
          - |
            10
            O(n)
            16
            O(n^2)
      - name: Recursion
        obj: 'Implement `def factorial(n):` using recursion, with base case `n <= 1`. Test with `5` and print the result.'
        hint: 'A recursive function calls itself with a smaller input, and stops at a base case. `factorial(n) = n * factorial(n - 1)`, with `factorial(0)` and `factorial(1)` both `1`.'
        expl: 'Recursion breaks a problem into a smaller version of itself. Each call waits for the next to return, building up the final answer as the calls unwind.'
        sol: |-
          def factorial(n):
              if n <= 1:
                  return 1
              return n * factorial(n - 1)
          print(factorial(5))
        start: ''
        max: 6/1
        tests:
          - |
            120
      - name: Divide & Conquer
        obj: 'Implement `def find_max(arr, low, high):` that finds the maximum value in `arr[low:high+1]` using divide and conquer: split the range in half, recursively find the max of each half, then return the larger. Base case: if `low == high`, return `arr[low]`. Test with `[3, 7, 1, 9, 4]` calling `find_max(arr, 0, len(arr) - 1)` and print the result.'
        hint: 'Split the range in half with `mid = (low + high) // 2`. Recurse on `[low, mid]` and `[mid + 1, high]`, then return `max(left_result, right_result)`.'
        expl: 'Divide and conquer solves a problem by splitting it into smaller subproblems, solving each recursively, then combining their results. Finding a max this way is still O(n), but the same pattern generalizes to more powerful algorithms like merge sort.'
        sol: |-
          def find_max(arr, low, high):
              if low == high:
                  return arr[low]
              mid = (low + high) // 2
              left_max = find_max(arr, low, mid)
              right_max = find_max(arr, mid + 1, high)
              return max(left_max, right_max)
          nums = [3, 7, 1, 9, 4]
          print(find_max(nums, 0, len(nums) - 1))
        start: ''
        max: 9/1
        tests:
          - |
            9
      - name: LeetCode 50 · Pow(x, n)
        obj: 'Implement `def my_pow(x, n):` computing x^n in O(log n) using fast exponentiation (divide and conquer): if `n` is even, `x^n = (x^(n // 2))^2`; if odd, multiply by one extra `x`. Handle negative `n` by inverting (`1 / my_pow(x, -n)`). Read `x` (float) and `n` (int), print the result rounded to 2 decimal places.'
        example:
          in:
            - 2.0
            - 10
          out: |
            1024.0
        sol: |-
          def my_pow(x, n):
              if n < 0:
                  return 1 / my_pow(x, -n)
              if n == 0:
                  return 1
              half = my_pow(x, n // 2)
              if n % 2 == 0:
                  return half * half
              return half * half * x
          x = float(input())
          n = int(input())
          print(round(my_pow(x, n), 2))
        max: 12/1
        tests:
          - in:
              - 2.0
              - 10
            exp: |
              1024.0
          - in:
              - 2.0
              - -2
            exp: |
              0.25
  - name: Searching
    icon: searching
    levels:
      - name: Linear Search
        viz: pointers
        obj: 'Implement `def linear_search(arr, target):` that returns the index of `target` in `arr`, or `-1` if not found, checking each element in order. Test with `[4, 2, 7, 1, 9]` searching for `7` and `5`, printing both results.'
        hint: 'Loop through the array with `enumerate` to get both index and value. Return the index the moment you find a match.'
        expl: 'Linear search checks every element one by one — O(n) in the worst case. It works on any list, sorted or not, but binary search (next lesson) is faster when the list is sorted.'
        sol: |-
          def linear_search(arr, target):
              for i, val in enumerate(arr):
                  if val == target:
                      return i
              return -1
          nums = [4, 2, 7, 1, 9]
          print(linear_search(nums, 7))
          print(linear_search(nums, 5))
        start: ''
        max: 9/1
        tests:
          - |
            2
            -1
      - name: Binary Search
        viz: pointers
        obj: 'Implement `def binary_search(arr, target):` on a SORTED array using the iterative low/high/mid approach. Test with `[1, 3, 5, 7, 9, 11]` searching for `7` and `4`, printing both results.'
        hint: 'Compare the middle element to the target. If the target is larger, search the right half (`low = mid + 1`); if smaller, search the left half (`high = mid - 1`).'
        expl: 'Binary search halves the search space each step, giving O(log n) time — much faster than linear search, but it requires the array to already be sorted.'
        sol: |-
          def binary_search(arr, target):
              low, high = 0, len(arr) - 1
              while low <= high:
                  mid = (low + high) // 2
                  if arr[mid] == target:
                      return mid
                  elif arr[mid] < target:
                      low = mid + 1
                  else:
                      high = mid - 1
              return -1
          nums = [1, 3, 5, 7, 9, 11]
          print(binary_search(nums, 7))
          print(binary_search(nums, 4))
        start: ''
        max: 14/1
        tests:
          - |
            3
            -1
      - name: LeetCode 33 · Search in Rotated Sorted Array
        obj: 'Implement `def search_rotated(nums, target):` that finds `target` in a rotated sorted array (no duplicates) in O(log n) using a modified binary search: at each step, figure out which half is normally sorted, then check if the target falls in that half''s range. Read the array and target, print the found index or `-1`.'
        example:
          in:
            - 4 5 6 7 0 1 2
            - 0
          out: |
            4
        sol: |-
          def search_rotated(nums, target):
              low, high = 0, len(nums) - 1
              while low <= high:
                  mid = (low + high) // 2
                  if nums[mid] == target:
                      return mid
                  if nums[low] <= nums[mid]:
                      if nums[low] <= target < nums[mid]:
                          high = mid - 1
                      else:
                          low = mid + 1
                  else:
                      if nums[mid] < target <= nums[high]:
                          low = mid + 1
                      else:
                          high = mid - 1
              return -1
          nums = list(map(int, input().split()))
          target = int(input())
          print(search_rotated(nums, target))
        max: 20/1
        tests:
          - in:
              - 4 5 6 7 0 1 2
              - 0
            exp: |
              4
          - in:
              - 4 5 6 7 0 1 2
              - 3
            exp: |
              -1
  - name: Sorting
    icon: sorting
    levels:
      - name: Bubble Sort
        viz: sort
        obj: 'Implement `def bubble_sort(arr):` that sorts `arr` in place with repeated adjacent swaps: each pass bubbles the largest unsorted element to the end. Test with `[5, 2, 9, 1, 5, 6]` and print the sorted list.'
        hint: 'Compare each adjacent pair; swap if out of order. After each full pass, the largest remaining element "bubbles" to its correct spot at the end, so each pass can be one element shorter.'
        expl: 'Bubble sort repeatedly swaps adjacent out-of-order elements. It''s O(n^2), but a good first sort to build intuition for in-place comparisons and swaps.'
        sol: |-
          def bubble_sort(arr):
              n = len(arr)
              for i in range(n):
                  for j in range(n - 1 - i):
                      if arr[j] > arr[j + 1]:
                          arr[j], arr[j + 1] = arr[j + 1], arr[j]
              return arr
          nums = [5, 2, 9, 1, 5, 6]
          print(bubble_sort(nums))
        start: ''
        max: 10/1
        tests:
          - |
            [1, 2, 5, 5, 6, 9]
      - name: Selection Sort
        viz: sort
        obj: 'Implement `def selection_sort(arr):` that sorts in place: for each position, find the minimum of the remaining unsorted elements and swap it into place. Test with `[64, 25, 12, 22, 11]` and print the sorted list.'
        hint: 'Track the index of the smallest value found so far in the unsorted portion, then swap it into the current position once the inner loop finishes.'
        expl: 'Selection sort finds the minimum of the remaining unsorted elements each pass and places it at the front. Also O(n^2), but it makes at most n swaps total.'
        sol: |-
          def selection_sort(arr):
              n = len(arr)
              for i in range(n):
                  min_idx = i
                  for j in range(i + 1, n):
                      if arr[j] < arr[min_idx]:
                          min_idx = j
                  arr[i], arr[min_idx] = arr[min_idx], arr[i]
              return arr
          nums = [64, 25, 12, 22, 11]
          print(selection_sort(nums))
        start: ''
        max: 11/1
        tests:
          - |
            [11, 12, 22, 25, 64]
      - name: Insertion Sort
        viz: sort
        obj: 'Implement `def insertion_sort(arr):` that builds a sorted portion at the front by taking each next element and shifting it backward into its correct position. Test with `[12, 11, 13, 5, 6]` and print the sorted list.'
        hint: 'Save the current element as `key`, then shift every larger element in the sorted portion one step right, and drop `key` into the gap left behind.'
        expl: 'Insertion sort grows a sorted region one element at a time, like sorting playing cards in your hand. It''s O(n^2) worst case but very fast on nearly-sorted data.'
        sol: |-
          def insertion_sort(arr):
              for i in range(1, len(arr)):
                  key = arr[i]
                  j = i - 1
                  while j >= 0 and arr[j] > key:
                      arr[j + 1] = arr[j]
                      j -= 1
                  arr[j + 1] = key
              return arr
          nums = [12, 11, 13, 5, 6]
          print(insertion_sort(nums))
        start: ''
        max: 11/1
        tests:
          - |
            [5, 6, 11, 12, 13]
      - name: Merge Sort
        viz: sort
        obj: 'Implement `def merge_sort(arr):` using divide and conquer: split the list in half, recursively sort each half, then merge the two sorted halves. Test with `[38, 27, 43, 3, 9, 82, 10]` and print the sorted list.'
        hint: 'Split into two halves, call `merge_sort` on each recursively, then merge: repeatedly take the smaller front element from each sorted half.'
        expl: 'Merge sort splits the array, recursively sorts each half, and merges them back together in order. It runs in guaranteed O(n log n) time, unlike the O(n^2) sorts above.'
        sol: |-
          def merge_sort(arr):
              if len(arr) <= 1:
                  return arr
              mid = len(arr) // 2
              left = merge_sort(arr[:mid])
              right = merge_sort(arr[mid:])
              result = []
              i = j = 0
              while i < len(left) and j < len(right):
                  if left[i] <= right[j]:
                      result.append(left[i])
                      i += 1
                  else:
                      result.append(right[j])
                      j += 1
              result.extend(left[i:])
              result.extend(right[j:])
              return result
          nums = [38, 27, 43, 3, 9, 82, 10]
          print(merge_sort(nums))
        start: ''
        max: 20/1
        tests:
          - |
            [3, 9, 10, 27, 38, 43, 82]
      - name: Quick Sort
        viz: sort
        obj: 'Implement `def quick_sort(arr):` using divide and conquer: pick a pivot, partition elements into less-than and greater-than-or-equal groups, and recursively sort each. Test with `[10, 7, 8, 9, 1, 5]` and print the sorted list.'
        hint: 'Pick a pivot (e.g. the middle element), then split into three lists: smaller than pivot, equal to pivot, larger than pivot. Recursively sort the outer two and concatenate all three.'
        expl: 'Quick sort partitions around a pivot so everything smaller ends up left of it and everything larger ends up right, then recurses on each side. Average case is O(n log n), though a bad pivot choice can degrade to O(n^2).'
        sol: |-
          def quick_sort(arr):
              if len(arr) <= 1:
                  return arr
              pivot = arr[len(arr) // 2]
              left = [x for x in arr if x < pivot]
              middle = [x for x in arr if x == pivot]
              right = [x for x in arr if x > pivot]
              return quick_sort(left) + middle + quick_sort(right)
          nums = [10, 7, 8, 9, 1, 5]
          print(quick_sort(nums))
        start: ''
        max: 11/1
        tests:
          - |
            [1, 5, 7, 8, 9, 10]
      - name: Heap Sort
        viz: sort
        obj: 'Implement `def heapify(arr, n, i):` that fixes one max-heap violation at index `i` (comparing against its two children and sifting down), and `def heap_sort(arr):` that builds a max-heap from the bottom up, then repeatedly swaps the root (largest) to the end and re-heapifies the shrinking heap. Test with `[12, 11, 13, 5, 6, 7]` and print the sorted list.'
        hint: 'Build the heap bottom-up over `range(n // 2 - 1, -1, -1)`. To extract in order, swap `arr[0]` with `arr[i]` for `i` from the end down to `1`, re-heapifying the shrinking prefix each time.'
        expl: 'Heap sort builds a max-heap so the largest element is always at the root, then repeatedly extracts it to the end of the array and restores the heap property on what remains. O(n log n) guaranteed, and it sorts in place.'
        sol: |-
          def heapify(arr, n, i):
              largest = i
              left = 2 * i + 1
              right = 2 * i + 2
              if left < n and arr[left] > arr[largest]:
                  largest = left
              if right < n and arr[right] > arr[largest]:
                  largest = right
              if largest != i:
                  arr[i], arr[largest] = arr[largest], arr[i]
                  heapify(arr, n, largest)

          def heap_sort(arr):
              n = len(arr)
              for i in range(n // 2 - 1, -1, -1):
                  heapify(arr, n, i)
              for i in range(n - 1, 0, -1):
                  arr[0], arr[i] = arr[i], arr[0]
                  heapify(arr, i, 0)
              return arr

          nums = [12, 11, 13, 5, 6, 7]
          print(heap_sort(nums))
        start: ''
        max: 22/1
        tests:
          - |
            [5, 6, 7, 11, 12, 13]
      - name: LeetCode 75 · Sort Colors
        obj: 'Implement `def sort_colors(nums):` that sorts an array containing only `0`, `1`, `2` in a single O(n) pass using the Dutch National Flag algorithm (three pointers: `low`, `mid`, `high`), sorting in place. Read the array, sort it, then print it.'
        example:
          in:
            - 2 0 2 1 1 0
          out: |
            [0, 0, 1, 1, 2, 2]
        sol: |-
          def sort_colors(nums):
              low, mid, high = 0, 0, len(nums) - 1
              while mid <= high:
                  if nums[mid] == 0:
                      nums[low], nums[mid] = nums[mid], nums[low]
                      low += 1
                      mid += 1
                  elif nums[mid] == 1:
                      mid += 1
                  else:
                      nums[mid], nums[high] = nums[high], nums[mid]
                      high -= 1
              return nums
          arr = list(map(int, input().split()))
          print(sort_colors(arr))
        max: 15/1
        tests:
          - in: 2 0 2 1 1 0
            exp: |
              [0, 0, 1, 1, 2, 2]
          - in: 1 0 2 1 0
            exp: |
              [0, 0, 1, 1, 2]
  - name: Array Patterns
    icon: array
    levels:
      - name: Prefix Sum
        obj: 'Implement `def build_prefix_sum(arr):` returning a prefix sum array where `prefix[i]` is the sum of `arr[0..i]` inclusive, and `def range_sum(prefix, l, r):` returning the sum of `arr[l..r]` inclusive in O(1) using the prefix array. Test with `arr = [2, 4, 6, 8, 10]`, build the prefix sum, then print `range_sum(prefix, 1, 3)`.'
        hint: '`prefix[i]` stores the running total up to index `i`. For a range `[l, r]`, subtract everything before `l`: `prefix[r] - prefix[l - 1]` (or just `prefix[r]` when `l` is 0).'
        expl: 'A prefix sum array precomputes running totals so any range sum query can be answered in O(1) instead of re-summing the range every time — a big win when there are many queries.'
        sol: |-
          def build_prefix_sum(arr):
              prefix = [arr[0]]
              for i in range(1, len(arr)):
                  prefix.append(prefix[-1] + arr[i])
              return prefix

          def range_sum(prefix, l, r):
              if l == 0:
                  return prefix[r]
              return prefix[r] - prefix[l - 1]

          arr = [2, 4, 6, 8, 10]
          prefix = build_prefix_sum(arr)
          print(range_sum(prefix, 1, 3))
        start: ''
        max: 12/1
        tests:
          - |
            18
      - name: Two Pointers
        viz: pointers
        obj: 'Implement `def pair_sum_sorted(arr, target):` that finds a pair of numbers in a SORTED array summing to `target`, using two pointers starting at both ends and moving inward. Return the pair as a tuple, or `None` if not found. Test with `[1, 3, 4, 6, 8, 10]` looking for a pair summing to `10`.'
        hint: 'Start with pointers at both ends. If the sum is too small, move the left pointer right (increase the sum); if too large, move the right pointer left (decrease the sum).'
        expl: 'Two pointers exploit sorted order to scan from both ends inward, solving pair-sum problems in O(n) instead of the O(n^2) of checking every pair.'
        sol: |-
          def pair_sum_sorted(arr, target):
              left, right = 0, len(arr) - 1
              while left < right:
                  current = arr[left] + arr[right]
                  if current == target:
                      return (arr[left], arr[right])
                  elif current < target:
                      left += 1
                  else:
                      right -= 1
              return None
          nums = [1, 3, 4, 6, 8, 10]
          print(pair_sum_sorted(nums, 10))
        start: ''
        max: 13/1
        tests:
          - |
            (4, 6)
      - name: Sliding Window
        viz: pointers
        obj: 'Implement `def max_sum_subarray(arr, k):` that finds the maximum sum of any contiguous subarray of size `k`, using a sliding window (add the new element, remove the oldest) in O(n) total. Test with `[2, 1, 5, 1, 3, 2]` and `k = 3`, printing the result.'
        hint: 'Compute the sum of the first `k` elements once. Then slide one step at a time: add the incoming element, subtract the outgoing one — no need to re-sum the whole window.'
        expl: 'A sliding window keeps a running computation over a fixed-size range, updating incrementally as it moves — turning what looks like an O(n*k) problem into O(n).'
        sol: |-
          def max_sum_subarray(arr, k):
              window_sum = sum(arr[:k])
              best = window_sum
              for i in range(k, len(arr)):
                  window_sum += arr[i] - arr[i - k]
                  best = max(best, window_sum)
              return best
          nums = [2, 1, 5, 1, 3, 2]
          print(max_sum_subarray(nums, 3))
        start: ''
        max: 9/1
        tests:
          - |
            9
      - name: LeetCode 3 · Longest Substring Without Repeating Characters
        obj: 'Implement `def length_of_longest_substring(s):` returning the length of the longest substring without repeating characters, using a sliding window with a set tracking the characters currently in the window. Read a string and print the result.'
        example:
          in:
            - abcabcbb
          out: |
            3
        sol: |-
          def length_of_longest_substring(s):
              seen = set()
              left = 0
              best = 0
              for right in range(len(s)):
                  while s[right] in seen:
                      seen.remove(s[left])
                      left += 1
                  seen.add(s[right])
                  best = max(best, right - left + 1)
              return best
          s = input()
          print(length_of_longest_substring(s))
        max: 13/1
        tests:
          - in: abcabcbb
            exp: |
              3
          - in: bbbbb
            exp: |
              1
  - name: Hashing Patterns
    icon: hash
    levels:
      - name: Frequency Counter
        viz: hash_map
        obj: 'Implement `def char_frequency(s):` returning a dict mapping each character in `s` to how many times it appears. Test with `"banana"` and print the result sorted by key.'
        hint: 'Use `freq.get(ch, 0) + 1` to either start a new count at 1 or increment the existing one, in a single line per character.'
        expl: 'A frequency counter uses a hash map to count occurrences in a single O(n) pass — the foundation for anagram checks, majority element problems, and more.'
        sol: |-
          def char_frequency(s):
              freq = {}
              for ch in s:
                  freq[ch] = freq.get(ch, 0) + 1
              return freq
          result = char_frequency("banana")
          print(dict(sorted(result.items())))
        start: ''
        max: 8/1
        tests:
          - |
            {'a': 3, 'b': 1, 'n': 2}
      - name: Hash Map Lookup
        viz: hash_map
        obj: 'Implement `def two_sum(nums, target):` returning the indices of two numbers in `nums` that add up to `target`, using a single pass with a hash map from value to index (not the O(n^2) brute-force pair check). Test with `[2, 7, 11, 15]` and `target = 9`, printing the result.'
        hint: 'For each number, check if its complement (`target - num`) has already been seen. If so, you''ve found your pair — return immediately, no nested loop needed.'
        expl: 'Storing seen values in a hash map turns two-sum from O(n^2) (checking every pair) into O(n) (a hash map lookup is O(1) on average).'
        sol: |-
          def two_sum(nums, target):
              seen = {}
              for i, num in enumerate(nums):
                  complement = target - num
                  if complement in seen:
                      return [seen[complement], i]
                  seen[num] = i
              return []
          print(two_sum([2, 7, 11, 15], 9))
        start: ''
        max: 10/1
        tests:
          - |
            [0, 1]
      - name: LeetCode 49 · Group Anagrams
        obj: 'Implement `def group_anagrams(strs):` that groups strings that are anagrams of each other, using a hash map keyed by each word''s sorted letters. Read space-separated words, group them, then print the groups: sort each group''s words, and sort the groups by their first word, so the output is deterministic.'
        example:
          in:
            - eat tea tan ate nat bat
          out: |
            [['ate', 'eat', 'tea'], ['bat'], ['nat', 'tan']]
        sol: |-
          def group_anagrams(strs):
              groups = {}
              for word in strs:
                  key = "".join(sorted(word))
                  groups.setdefault(key, []).append(word)
              result = [sorted(group) for group in groups.values()]
              result.sort(key=lambda g: g[0])
              return result
          words = input().split()
          print(group_anagrams(words))
        max: 11/1
        tests:
          - in: eat tea tan ate nat bat
            exp: |
              [['ate', 'eat', 'tea'], ['bat'], ['nat', 'tan']]
          - in: abc
            exp: |
              [['abc']]
  - name: Tree Patterns
    icon: tree
    levels:
      - name: Tree Traversal
        viz: tree_traversal
        obj: 'Define a `class TreeNode:` with `value`, `left`, and `right`. Implement `def inorder(node, result):` that appends values in Left-Root-Right order into `result`. Build the tree: root `2`, left `1`, right `3`. Call inorder and print the result list.'
        hint: 'Recurse left, then record the current node''s value, then recurse right. Passing `result` through every call lets all the recursive branches share the same growing list.'
        expl: 'In-order traversal (Left-Root-Right) is one of the three standard ways to visit every node of a binary tree; on a BST it produces values in sorted order.'
        sol: |-
          class TreeNode:
              def __init__(self, value):
                  self.value = value
                  self.left = None
                  self.right = None
          def inorder(node, result):
              if node:
                  inorder(node.left, result)
                  result.append(node.value)
                  inorder(node.right, result)
              return result
          root = TreeNode(2)
          root.left = TreeNode(1)
          root.right = TreeNode(3)
