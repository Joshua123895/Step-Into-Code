      - name: LeetCode 152 · Maximum Product Subarray
        obj: 'Implement `def max_product(nums):` returning the largest product of any contiguous non-empty subarray. Track both the running max and running min, since a negative times a negative can become the new max. Read the array, print the result.'
        example:
          in:
            - 2 3 -2 4
          out: |
            6
        sol: |-
          def max_product(nums):
              best = cur_max = cur_min = nums[0]
              for x in nums[1:]:
                  cands = (x, cur_max * x, cur_min * x)
                  cur_max = max(cands)
                  cur_min = min(cands)
                  best = max(best, cur_max)
              return best
          nums = list(map(int, input().split()))
          print(max_product(nums))
        max: 12/1
        tests:
          - in: 2 3 -2 4
            exp: |
              6
          - in: -2 0 -1
            exp: |
              0
      - name: LeetCode 300 · Longest Increasing Subsequence
        obj: 'Implement `def lis(nums):` returning the length of the longest strictly increasing subsequence in O(n log n) by binary-searching a tails array (patience sorting). Read the array, print the length.'
        example:
          in:
            - 10 9 2 5 3 7 101 18
          out: |
            4
        sol: |-
          import bisect
          def lis(nums):
              tails = []
              for x in nums:
                  i = bisect.bisect_left(tails, x)
                  if i == len(tails):
                      tails.append(x)
                  else:
                      tails[i] = x
              return len(tails)
          nums = list(map(int, input().split()))
          print(lis(nums))
        max: 14/1
        tests:
          - in: 10 9 2 5 3 7 101 18
            exp: |
              4
          - in: 0 1 0 3 2 3
            exp: |
              4
      - name: LeetCode 128 · Longest Consecutive Sequence
        obj: 'Implement `def longest_consecutive(nums):` returning the length of the longest run of consecutive integers (in any order) in O(n) using a set. Read the array, print the length.'
        example:
          in:
            - 100 4 200 1 3 2
          out: |
            4
        sol: |-
          def longest_consecutive(nums):
              s = set(nums)
              best = 0
              for x in s:
                  if x - 1 not in s:
                      length = 1
                      while x + length in s:
                          length += 1
                      best = max(best, length)
              return best
          nums = list(map(int, input().split()))
          print(longest_consecutive(nums))
        max: 14/1
        tests:
          - in: 100 4 200 1 3 2
            exp: |
              4
          - in: 0 3 7 2 5 8 4 6 0 1
            exp: |
              9
