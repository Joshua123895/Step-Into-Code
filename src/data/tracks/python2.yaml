      - name: Post-Init Processing
        obj: '`@dataclass class Rectangle:` with `width: float, height: float`. In `__post_init__`: `if self.width < self.height: self.width, self.height = self.height, self.width`. `print(Rectangle(3.0, 5.0))`.'
        hint: '`def __post_init__(self):` runs right after `__init__`. Use it to swap, validate, or compute derived fields.'
        expl: |-
          `__post_init__` is a special method dataclasses call at the end of the auto-generated `__init__`. Use it for validation (raise error if invalid), normalization (swap values to maintain an invariant), or computing derived fields. Here we ensure `width >= height` by swapping if needed.
        sol: |-
          from dataclasses import dataclass
          @dataclass
          class Rectangle:
              width: float
              height: float
              def __post_init__(self):
                  if self.width < self.height:
                      self.width, self.height = self.height, self.width
          r = Rectangle(3.0, 5.0)
          print(r)
        tests:
          - |
            Rectangle(width=5.0, height=3.0)
