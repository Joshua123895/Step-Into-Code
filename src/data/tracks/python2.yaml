        obj: Define `def squares(nums):` that yields squares of input values, and `def evens(nums):` that yields only even numbers. Pipe `range(6)` through both and print the result as a list.
        hint: Chain by calling one generator inside the other's loop.
        expl: Generators can be composed into pipelines. Each generator yields values that feed into the next.
