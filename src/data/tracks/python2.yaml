          `ExitStack` manages context managers dynamically. Use `stack.enter_context(cm)` to enter a context manager at any point — it returns the `__enter__` result. When the `with ExitStack()` block exits, all entered contexts are cleaned up in reverse order. This is useful when you don't know how many context managers you'll need at runtime.
