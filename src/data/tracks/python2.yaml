      - name: The Beyond Horizon
        obj: 'Define a generic function `group_by(items: List, key: Callable) -> Dict` that groups items by a key function. Use Callable type hint. Read numbers, group by even/odd, print the dict.'
        example:
          in:
            - 1 2 3 4 5 6
          out: |
            {0: [2, 4, 6], 1: [1, 3, 5]}
        sol: |-
          from typing import Callable, Dict, List
          def group_by(items: List, key: Callable) -> Dict:
              result = {}
              for item in items:
                  k = key(item)
                  if k not in result:
                      result[k] = []
                  result[k].append(item)
              return result
          nums = list(map(int, input().split()))
          result = group_by(nums, lambda x: x % 2)
          print(result)
        tests:
