  - name: Timer Context Manager
    obj: Use `@contextmanager` to create a `timer` that prints elapsed time in seconds on exit. Import `time`.
    hint: Record `start = time.time()` before `yield`, then subtract after.
    expl: Context managers are great for measuring execution time â€” setup records the start, teardown computes and reports the delta.
    sol: "from contextlib import contextmanager\nimport time\n@contextmanager\ndef timer():\n    start = time.time()\n    yield\n    elapsed = time.time() - start\n    print(f\"{elapsed:.3f}s\")\nwith timer():\n    total = sum(range(100000))\nprint(\"Done\")"
