        obj: 'Define `class CountDown:` with `__init__(self, n)`, `__iter__(self)`, and `__next__(self)` that counts from `n` down to `1`. `for x in CountDown(5): print(x)`.'
        hint: '`__iter__` returns `self`. `__next__` returns current value then decrements. Raise `StopIteration` when `n <= 0`.'
        expl: |-
          A custom iterator is a class with two methods: `__iter__(self)` returns `self` (the iterator object), and `__next__(self)` returns the next value or raises `StopIteration` when done. Each call to `next()` decrements `n`, and we return `n+1` so the first value is the original `n`.
