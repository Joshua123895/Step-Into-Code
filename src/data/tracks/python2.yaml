- name: Challenges
  icon: challenge
  levels:
  - name: 'The Sieve of Comprehension'
    obj: 'Read n and use a nested list comprehension to find all Pythagorean triples (a,b,c) with 1 <= a <= b <= c <= n where a^2 + b^2 = c^2. Print the list.'
    example:
      in:
      - '20'
      out: '[(3, 4, 5), (5, 12, 13), (6, 8, 10), (8, 15, 17), (9, 12, 15), (12, 16, 20)]

