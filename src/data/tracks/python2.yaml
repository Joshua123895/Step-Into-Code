    - in:
      - '2'
      - Zed 100 100
      - Aaron 90 90
      exp: '[''Zed'', ''Aaron'']

        '
    max: 10/1
  - name: 'The Type Maze'
    obj: 'Define a generic function interleave[T, U](a, b) that interleaves two lists element by element. Use proper type hints. Read int list and string list, interleave, print.'
    example:
      in:
      - 1 2 3
      - a b c
      out: '[1, ''a'', 2, ''b'', 3, ''c'']

        '
    sol: "def interleave[T, U](a: list[T], b: list[U]) -> list[T | U]:\n    result: list[T | U] = []\n    for x, y in zip(a, b):\n        result.append(x)\n        result.append(y)\n    return result\na = list(map(int, input().split()))\nb = input().split()\nprint(interleave(a, b))"
    tests:
    - in:
      - 1 2 3
      - a b c
      exp: '[1, ''a'', 2, ''b'', 3, ''c'']

