      track:
      - test.txt
  - name: Custom Context Manager Class
    obj: Define `class ManagedFile:` with `__enter__` (print "Enter") and `__exit__` (print "Exit"), then use it with `with`.
    hint: '`__exit__` takes `(self, exc_type, exc_val, exc_tb)`.'
    expl: A context manager class must implement `__enter__` (returns the bound resource) and `__exit__` (releases it).
    sol: "class ManagedFile:\n    def __enter__(self):\n        print(\"Enter\")\n        return self\n    def __exit__(self, *args):\n        print(\"Exit\")\nwith ManagedFile() as m:\n    print(\"Inside\")"
    tests:
    - 'Enter

