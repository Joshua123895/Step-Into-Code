  - name: ExitStack
    obj: Use `ExitStack` from `contextlib` to manage two `redirect_stdout` contexts. Read a name, capture two print outputs, and print the captured text.
    hint: '`from contextlib import ExitStack, redirect_stdout` â€” use `stack.enter_context(redirect_stdout(buf))` to redirect.'
    expl: '`ExitStack` lets you manage multiple context managers dynamically. All entered contexts are cleaned up when you exit the stack, even if you don''t know the number upfront.'
    sol: "from contextlib import ExitStack, redirect_stdout\nfrom io import StringIO\nname = input()\nbuf1 = StringIO()\nbuf2 = StringIO()\nwith ExitStack() as stack:\n    stack.enter_context(redirect_stdout(buf1))\n    print(f\"Hello, {name}\")\n    stack.enter_context(redirect_stdout(buf2))\n    print(f\"Welcome, {name}\")\nprint(buf1.getvalue().strip())\nprint(buf2.getvalue().strip())"
