        start: ''
      - name: The Grand Beyond
        obj: 'Read `n = int(input())`. Read `n` lines of `var, _, val = input().split()` storing `vars[var] = int(val)`. Read `expr = input().split()`. Define `ops = {"+": lambda a,b: a+b, "-": lambda a,b: a-b, "*": lambda a,b: a*b, "/": lambda a,b: a//b}`. Use a stack: push integers/variable values, pop two for ops. Print `stack[0]`.'
        example:
          in:
            - '3'
            - x = 5
            - y = 10
            - z = 2
            - x y * z /
          out: |
            25
        sol: |-
          from typing import Callable, Dict, List
          n = int(input())
          vars = {}
          for _ in range(n):
              var, _, val = input().split()
              vars[var] = int(val)
          expr = input().split()
          ops = {
              '+': lambda a, b: a + b,
              '-': lambda a, b: a - b,
              '*': lambda a, b: a * b,
              '/': lambda a, b: a // b,
          }
          stack: List[int] = []
          for token in expr:
              if token in ops:
                  b = stack.pop()
                  a = stack.pop()
                  stack.append(ops[token](a, b))
              elif token in vars:
                  stack.append(vars[token])
              else:
                  stack.append(int(token))
          print(stack[0])
        tests:
          - in:
              - '3'
              - x = 5
              - y = 10
              - z = 2
              - x y * z /
            exp: |
              25
          - in:
              - '2'
              - a = 7
              - b = 3
              - a b + 2 *
            exp: |
              20
        max: 20/1
        start: |-
          from typing import Callable, Dict, List

          n = int(input())
