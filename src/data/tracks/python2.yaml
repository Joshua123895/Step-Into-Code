        obj: 'Read `name = input()`. Read `parts = [int(x) for x in input().split()]`. First element is `count`, remaining are `grades`. Define `@dataclass class Student:` with `name: str`, `grades: list[int] = field(default_factory=list)`, `average: float = 0.0`, `status: str = ""`. In `__post_init__`: compute `self.average = sum(grades)/len(grades)` and `self.status = "Passed" if average >= 60 else "Failed"`. Create `s = Student(name=name, grades=grades)`, `print(s)`.'
