        expl: |-
          You can open multiple files in one `with` statement by separating them with commas: `with open(...) as a, open(...) as b:`. Both files are opened (entered) left-to-right and both are properly closed (exited) right-to-left when the block ends. This is cleaner than nesting `with` blocks.
