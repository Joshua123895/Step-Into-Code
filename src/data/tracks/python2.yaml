      - name: The Grand Beyond
        obj: 'Evaluate a postfix expression with variables. Read n, then n lines of "var = value", then a postfix expression. Use a dict of lambdas and a stack. Operators: + - * / (integer division). Print the result.'
        example:
          in:
            - '3'
            - x = 5
            - y = 10
            - z = 2
            - x y * z /
          out: |
            25
        sol: |-
          from typing import Callable, Dict, List
          n = int(input())
          vars = {}
          for _ in range(n):
              var, _, val = input().split()
              vars[var] = int(val)
          expr = input().split()
          ops = {
              '+': lambda a, b: a + b,
              '-': lambda a, b: a - b,
              '*': lambda a, b: a * b,
              '/': lambda a, b: a // b,
          }
          stack: List[int] = []
          for token in expr:
              if token in ops:
                  b = stack.pop()
                  a = stack.pop()
                  stack.append(ops[token](a, b))
              elif token in vars:
                  stack.append(vars[token])
              else:
                  stack.append(int(token))
          print(stack[0])
        tests:
          - in:
              - '3'
              - x = 5
              - y = 10
              - z = 2
              - x y * z /
            exp: |
              25
          - in:
              - '2'
              - a = 7
              - b = 3
              - a b + 2 *
            exp: |
              20
