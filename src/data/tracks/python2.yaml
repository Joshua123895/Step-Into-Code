        expl: |-
          An iterator produces values one at a time. `iter(nums)` asks the list for an iterator. `next(it)` pulls the next value: first `10`, then `20`, then `30`. Calling `next()` a fourth time would raise `StopIteration` (the signal that the iterator is exhausted).
