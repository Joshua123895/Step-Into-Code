    sol: "from dataclasses import dataclass\n@dataclass\nclass Item:\n    name: str\n    price: float\n@dataclass\nclass DiscountedItem(Item):\n    discount: float = 0.0\n    @property\n    def final_price(self) -> float:\n        return self.price * (1 - self.discount / 100)\nname, price, disc = input().split()\nitem = DiscountedItem(name, float(price), float(disc))\nprint(f\"Item(name='{item.name}', final_price={item.final_price})\")"
    tests:
    - in: Laptop 1000 20
      exp: 'Item(name=''Laptop'', final_price=800.0)

        '
    - in: Book 50 10
      exp: 'Item(name=''Book'', final_price=45.0)

