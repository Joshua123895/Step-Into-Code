      - name: The Labyrinth of Yields
        obj: Define a generator windows(items, n) that yields all sliding windows of size n. Read n, items, and window size, then print the list of window tuples.
        example:
          in:
            - '5'
            - 1 2 3 4 5
            - '3'
          out: |
            [(1, 2, 3), (2, 3, 4), (3, 4, 5)]
        sol: |-
          def windows(items, n):
              it = iter(items)
              window = []
              for _ in range(n):
                  window.append(next(it))
              yield tuple(window)
              for item in it:
                  window.pop(0)
                  window.append(item)
                  yield tuple(window)
          n = int(input())
          items = input().split()
          size = int(input())
          print(list(windows(items, size)))
