  - name: 'The Context Crucible'
    obj: 'Define a @contextmanager that duplicates all print output inside its block. Read a string and print it inside the context, producing two copies.'
    example:
      in:
      - Hello
      out: 'Hello

        Hello

        '
    sol: "from contextlib import contextmanager, redirect_stdout\nfrom io import StringIO\n@contextmanager\ndef duplicate():\n    buf = StringIO()\n    with redirect_stdout(buf):\n        yield\n    lines = buf.getvalue().strip().split('\\n')\n    for line in lines:\n        print(line)\n        print(line)\nmsg = input()\nwith duplicate():\n    print(msg)"
    tests:
    - in: Hello
      exp: 'Hello

        Hello

        '
    - in: Python
      exp: 'Python

        Python

        '
