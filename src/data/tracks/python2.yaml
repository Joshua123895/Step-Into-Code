        obj: '`@dataclass class Rectangle:` with `width: float, height: float`. Add `def area(self) -> float: return self.width * self.height`. Create `r = Rectangle(5.0, 3.0); print(r.area())`.'
        hint: 'Methods in dataclasses work exactly like regular classes. Just `def area(self): …`.'
