      - name: Immutable Dataclass
        obj: '`@dataclass(frozen=True) class Point:` with `x: int, y: int`. `print(Point(1, 2))`. Attempting `p.x = 5` would raise `FrozenInstanceError`.'
        hint: 'Add `(frozen=True)` after `@dataclass`. The class becomes read-only.'
        expl: |-
          `frozen=True` makes the instance immutable — you cannot assign to fields after creation (`p.x = 5` raises an error). This is useful for value objects that should never change (like coordinates). Frozen dataclasses are also hashable by default, so they can be used in sets and as dict keys.
        sol: |-
          from dataclasses import dataclass
