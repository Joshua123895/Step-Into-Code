    max: 10/1
  - name: 'The Generator''s Gambit'
    obj: 'Define a generator that yields the Collatz sequence for a starting number. Read n, generate the sequence until reaching 1, and print as a list.'
    example:
      in:
      - '6'
      out: '[6, 3, 10, 5, 16, 8, 4, 2, 1]

        '
    sol: "def collatz(n):\n    yield n\n    while n != 1:\n        n = n // 2 if n % 2 == 0 else 3 * n + 1\n        yield n\nn = int(input())\nprint(list(collatz(n)))"
    tests:
    - in: '6'
