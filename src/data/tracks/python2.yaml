  - name: 'The Lambda''s Crucible'
    obj: 'Read n students with names and two scores. Compute weighted average (40% first, 60% second). Use sorted() with a lambda to rank by average desc, name asc. Print names.'
    example:
      in:
      - '3'
      - Alice 85 90
      - Bob 70 95
      - Charlie 60 80
      out: '[''Alice'', ''Bob'', ''Charlie'']

        '
    sol: "n = int(input())\nstudents = []\nfor _ in range(n):\n    parts = input().split()\n    name = parts[0]\n    s1, s2 = map(float, parts[1:])\n    avg = s1 * 0.4 + s2 * 0.6\n    students.append((name, avg))\nresult = sorted(students, key=lambda s: (-s[1], s[0]))\nprint([name for name, _ in result])"
