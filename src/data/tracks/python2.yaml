      - name: Dataclass with Property
        obj: '`@dataclass class Triangle:` with `a: float, b: float`. Add `@property def hypotenuse(self) -> float: return sqrt(self.a**2 + self.b**2)`. `print(Triangle(3.0, 4.0).hypotenuse)`.'
        hint: '`from math import sqrt`. Use `@property` above the method — call it without `()`: `t.hypotenuse` not `t.hypotenuse()`.'
        expl: |-
          `@property` turns a method into a read-only attribute. `t.hypotenuse` calls the method and returns the result, but you access it without parentheses. Inside the method, `sqrt(a**2 + b**2)` computes the Pythagorean theorem: sqrt(3² + 4²) = sqrt(9 + 16) = sqrt(25) = 5.0.
        sol: |-
          from dataclasses import dataclass
          from math import sqrt
          @dataclass
          class Triangle:
              a: float
              b: float
              @property
              def hypotenuse(self) -> float:
                  return sqrt(self.a ** 2 + self.b ** 2)
          t = Triangle(3.0, 4.0)
          print(t.hypotenuse)
        tests:
          - |
            5.0
        max: 8/1
