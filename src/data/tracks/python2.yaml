      - name: itertools Chain
        obj: 'Write `def chain(iterables):` that `yield from` each iterable. Read `a, b = map(int, input().split())`. Chain `range(a, b)` and `range(b, a-1, -1)`. Output the list.'
        hint: '`for it in iterables: yield from it`. Read input with `input().split()`. Chain forward and reversed ranges.'
        expl: |-
          `yield from` delegates to each iterable in sequence. Here we chain `range(a, b)` (ascending) and `range(b, a-1, -1)` (descending) so the sequence goes up then back down. The user inputs two numbers via `input()` which returns a space-separated string, split into `a` and `b`.
        sol: |-
          def chain(iterables):
              for it in iterables:
                  yield from it
          a, b = map(int, input().split())
          result = []
          for x in chain([range(a, b + 1), range(b - 1, a - 1, -1)]):
              result.append(x)
          print(result)
        tests:
          - in: 1 4
            exp: |
              [1, 2, 3, 4, 3, 2, 1]
          - in: 0 3
            exp: |
              [0, 1, 2, 3, 2, 1, 0]
        max: 9/1
        start: |-
          def chain(iterables):
              ...

          a, b = map(int, input().split())
      - name: The Labyrinth of Yields
        obj: |-
          Write `def windows(items, n):` that yields each sliding window of size `n` as a tuple. Read `n`, then `items = input().split()`, then `size = int(input())`. `print(list(windows(items, size)))`.
        example:
          in:
            - '5'
            - 1 2 3 4 5
            - '3'
          out: |
            [('1', '2', '3'), ('2', '3', '4'), ('3', '4', '5')]
        sol: |-
          n = int(input())
          items = input().split()
          size = int(input())
          def windows(items, n):
              it = iter(items)
              window = []
              for _ in range(n):
                  window.append(next(it))
              yield tuple(window)
              for item in it:
                  window.pop(0)
                  window.append(item)
                  yield tuple(window)
          print(list(windows(items, size)))
