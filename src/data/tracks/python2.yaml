      - name: Test Runner
        obj: 'Define `def test_add(): assert 1+1==2` and `def test_sub(): assert 3-1==2`. Define `def run_tests():` that iterates `globals()` items, finds names starting with `"test_"` that are `callable`, runs them, counts passes. Call `run_tests()`.'
        hint: '`for name, func in globals().items(): if name.startswith("test_") and callable(func): func(); passed += 1`'
        expl: |-
          `globals()` returns a dict of everything in the global scope. By filtering for names that start with `"test_"` and are callable (functions), you can auto-discover tests without listing them manually. This is the same idea behind how `pytest` discovers tests — it scans for `test_*` functions.
        sol: |-
          def test_add():
              assert 1 + 1 == 2
          def test_sub():
              assert 3 - 1 == 2
          def run_tests():
              passed = 0
              for name, func in list(globals().items()):
                  if name.startswith("test_") and callable(func):
                      func()
                      passed += 1
