      - name: Generator with Send
        obj: 'Define `def accumulate():` that uses `val = yield total` to receive values via `.send()`. Initialize with `next(acc)` then `print(acc.send(10))`, `acc.send(5)`, `acc.send(3)`.'
        hint: '`val = yield total` — `yield` both produces and receives. The first `.send()` won''t work without an initial `next(acc)` (to advance to the first yield).'
        expl: |-
          `generator.send(val)` sends a value into a generator, where it becomes the result of the `yield` expression. The first call must be `next(acc)` (or `acc.send(None)`) to advance to the first `yield`. After that, each `acc.send(val)` sends the next value and receives back the new running total. `yield total` returns the current total, then `val =` captures the sent value, and `total += val` updates it.
        sol: |-
          def accumulate():
              total = 0
              while True:
                  val = yield total
                  total += val
          acc = accumulate()
          next(acc)
          print(acc.send(10))
          print(acc.send(5))
          print(acc.send(3))
