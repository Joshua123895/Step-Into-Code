  - name: 'The Gauntlet of Shadows'
    obj: 'Read numbers. Use sorted() with a lambda on digit sum, filter odds with comprehension, map to binary with lambda. Print the list.'
    example:
      in:
      - 5 12 7 3 18
      out: '[''11'', ''101'', ''111'']

        '
    sol: "def digit_sum(n):\n    return sum(int(d) for d in str(n))\nnums = list(map(int, input().split()))\nsorted_nums = sorted(nums, key=lambda n: digit_sum(n))\nodds = [x for x in sorted_nums if x % 2 == 1]\nresult = list(map(lambda x: bin(x)[2:], odds))\nprint(result)"
