    max: 7/1
  - name: Nested Context Managers
    obj: Open two files `"a.txt"` and `"b.txt"` in a single `with` statement, writing "File A" and "File B" respectively.
    hint: 'Separate multiple context managers with commas: `with open(...) as a, open(...) as b:`.'
    expl: Multiple context managers can be combined in one `with` statement. Both are entered left-to-right and exited right-to-left.
    sol: "with open(\"a.txt\", \"w\") as a, open(\"b.txt\", \"w\") as b:\n    a.write(\"File A\")\n    b.write(\"File B\")\nwith open(\"a.txt\") as a, open(\"b.txt\") as b:\n    print(a.read())\n    print(b.read())"
