      - name: Basic Dataclass
        obj: '`from dataclasses import dataclass`. Add `@dataclass` above `class Point:`. Fields: `x: int` and `y: int`. Create `p = Point(3, 4); print(p)`.'
        hint: 'Place `@dataclass` on the line before `class Point:`. The `__init__` is auto-generated.'
        expl: |-
          A `@dataclass` automatically writes `__init__`, `__repr__`, `__eq__`, and `__hash__` for you based on the type-annotated fields. `Point(x=3, y=4)` auto-creates `p.x == 3` and `p.y == 4`. `print(p)` calls the auto-generated `__repr__` showing `Point(x=3, y=4)`.
        sol: |-
          from dataclasses import dataclass
          @dataclass
          class Point:
              x: int
              y: int
          p = Point(3, 4)
          print(p)
        tests:
          - |
            Point(x=3, y=4)
        max: 6/1
      - name: Default Values
        obj: '`@dataclass class Item:` with `name: str = "unknown"` and `price: float = 0.0`. `print(Item())` and `print(Item("Apple", 1.5))`.'
        hint: 'Defaults go right in the annotation: `name: str = "unknown"`. Order: fields without defaults first, then fields with defaults.'
        expl: |-
          Dataclass fields can have default values. `name: str = "unknown"` means if you create `Item()`, `name` defaults to `"unknown"` and `price` defaults to `0.0`. You can still override with `Item("Apple", 1.5)`. Fields with defaults must come after fields without defaults (same rule as function parameters).
        sol: |-
          from dataclasses import dataclass
          @dataclass
          class Item:
              name: str = "unknown"
              price: float = 0.0
          print(Item())
          print(Item("Apple", 1.5))
        tests:
