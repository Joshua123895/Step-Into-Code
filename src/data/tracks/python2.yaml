  - name: 'The Grand Beyond'
    obj: 'Evaluate a postfix expression with variables. Read n, then n lines of "var = value", then a postfix expression. Use a dict of lambdas and a stack. Operators: + - * / (integer division).'
    example:
      in:
      - '3'
      - x = 5
      - y = 10
      - z = 2
      - x y * z /
      out: '25

        '
    sol: "from collections.abc import Callable\nn = int(input())\nvars = {}\nfor _ in range(n):\n    var, _, val = input().split()\n    vars[var] = int(val)\nexpr = input().split()\nops: dict[str, Callable[[int, int], int]] = {\n    '+': lambda a, b: a + b,\n    '-': lambda a, b: a - b,\n    '*': lambda a, b: a * b,\n    '/': lambda a, b: a // b,\n}\nstack: list[int] = []\nfor token in expr:\n    if token in ops:\n        b = stack.pop()\n        a = stack.pop()\n        stack.append(ops[token](a, b))\n    elif token in vars:\n        stack.append(vars[token])\n    else:\n        stack.append(int(token))\nprint(stack[0])"
    tests:
    - in:
      - '3'
      - x = 5
      - y = 10
      - z = 2
      - x y * z /
      exp: '25

        '
    - in:
      - '2'
      - a = 7
      - b = 3
      - a b + 2 *
      exp: '20

        '
    max: 20/1
