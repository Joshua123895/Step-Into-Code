      - name: The Test of Champions
        obj: 'Write `def prime_factors(n):` (standard trial division). Write 5 test functions: `test_two` (2→[2]), `test_composite` (12→[2,2,3]), `test_large_prime` (17→[17]), `test_one` (1→[]), `test_perfect_square` (36→[2,2,3,3]). Use test-discovery runner: loop `globals()` items calling `callable` functions starting with `"test_"`.'
        example:
          in: []
          out: |
            5 tests passed
        sol: |-
          def prime_factors(n):
              i = 2
              factors = []
              while i * i <= n:
                  while n % i == 0:
                      factors.append(i)
                      n //= i
                  i += 1
              if n > 1:
                  factors.append(n)
              return factors
          def test_two():
              assert prime_factors(2) == [2]
          def test_composite():
              assert prime_factors(12) == [2, 2, 3]
          def test_large_prime():
              assert prime_factors(17) == [17]
          def test_one():
              assert prime_factors(1) == []
          def test_perfect_square():
              assert prime_factors(36) == [2, 2, 3, 3]
          tests_run = 0
          for name, fn in list(globals().items()):
              if name.startswith("test_") and callable(fn):
                  fn()
                  tests_run += 1
          print(f"{tests_run} tests passed")
        tests:
          - exp: |
              5 tests passed
