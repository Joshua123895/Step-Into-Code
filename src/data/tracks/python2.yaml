  - name: 'The Beyond Horizon'
    obj: 'Define a generic function group_by[T, K](items, key) that groups items by a key function. Use Callable type hint. Read numbers, group by even/odd, print the dict.'
    example:
      in:
      - 1 2 3 4 5 6
      out: '{0: [2, 4, 6], 1: [1, 3, 5]}

        '
    sol: "from collections.abc import Callable\ndef group_by[T, K](items: list[T], key: Callable[[T], K]) -> dict[K, list[T]]:\n    result: dict[K, list[T]] = {}\n    for item in items:\n        k = key(item)\n        if k not in result:\n            result[k] = []\n        result[k].append(item)\n    return result\nnums = list(map(int, input().split()))\nresult = group_by(nums, lambda x: x % 2)\nprint(result)"
    tests:
    - in: 1 2 3 4 5 6
      exp: '{0: [2, 4, 6], 1: [1, 3, 5]}

        '
    - in: 10 15 20 25
      exp: '{0: [10, 20], 1: [15, 25]}

        '
