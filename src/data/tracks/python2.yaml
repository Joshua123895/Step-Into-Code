          out: |
            Hello
            Hello
        sol: |-
          from contextlib import contextmanager, redirect_stdout
          from io import StringIO
          @contextmanager
          def duplicate():
              buf = StringIO()
              with redirect_stdout(buf):
                  yield
              lines = buf.getvalue().strip().split('\n')
              for line in lines:
                  print(line)
                  print(line)
          msg = input()
          with duplicate():
              print(msg)
        tests:
