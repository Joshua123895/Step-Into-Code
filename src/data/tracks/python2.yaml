  - name: 'The Test of Champions'
    obj: 'Write a function prime_factors(n) and a test suite with at least 5 test cases covering edge cases. Use the test-discovery runner pattern to print passed count.'
    example:
      in: []
      out: '5 tests passed

        '
    sol: "def prime_factors(n):\n    i = 2\n    factors = []\n    while i * i <= n:\n        while n % i == 0:\n            factors.append(i)\n            n //= i\n        i += 1\n    if n > 1:\n        factors.append(n)\n    return factors\ndef test_two():\n    assert prime_factors(2) == [2]\ndef test_composite():\n    assert prime_factors(12) == [2, 2, 3]\ndef test_large_prime():\n    assert prime_factors(17) == [17]\ndef test_one():\n    assert prime_factors(1) == []\ndef test_perfect_square():\n    assert prime_factors(36) == [2, 2, 3, 3]\ntests_run = 0\nfor name, fn in globals().items():\n    if name.startswith(\"test_\") and callable(fn):\n        fn()\n        tests_run += 1\nprint(f\"{tests_run} tests passed\")"
    tests:
    - exp: '5 tests passed

        '
