          To test that an exception is raised: call the function inside `try`, and if it doesn't raise, `assert False` fails the test. If it does raise `ValueError`, the `except` block catches it and passes. Also test the success case (`divide(10, 2)`) to ensure it works correctly when no error occurs.
        sol: |-
          def divide(a, b):
              if b == 0:
                  raise ValueError("Cannot divide by zero")
              return a / b
          try:
              divide(5, 0)
              assert False
          except ValueError:
              pass
          assert divide(10, 2) == 5.0
          print("Exception test passed")
        tests:
