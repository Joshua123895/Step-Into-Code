        obj: 'Define `def fibonacci():` that endlessly `yield`s Fibonacci numbers (0, 1, 1, 2, 3…). Print the first 8.'
        hint: '`a, b = 0, 1` then `while True: yield a; a, b = b, a + b`. Call `next()` 8 times.'
        expl: |-
