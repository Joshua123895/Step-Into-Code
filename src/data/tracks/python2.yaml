  - name: contextmanager Decorator
    obj: Import `contextmanager` from `contextlib` and use `@contextmanager` to create a simple timer that prints "Start" and "End".
    hint: '`yield` separates the setup code from the teardown code.'
    expl: The `@contextmanager` decorator lets you write a context manager as a generator. Code before `yield` runs on enter, code after runs on exit.
    sol: "from contextlib import contextmanager\n@contextmanager\ndef timer():\n    print(\"Start\")\n    yield\n    print(\"End\")\nwith timer():\n    print(\"Working\")"
    tests:
    - 'Start

      Working

      End

