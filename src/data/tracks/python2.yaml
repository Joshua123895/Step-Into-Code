      - name: Chaining Generators
        obj: 'Define `def squares(nums):` that yields `n**2` for each `n`, and `def evens(nums):` that yields `n` only when `n % 2 == 0`. `print(list(evens(squares(range(6)))))`.'
        hint: '`for n in nums: yield n**2` in squares. `for n in nums: if n%2==0: yield n` in evens. Then call `evens(squares(range(6)))`.'
        expl: |-
          Generators compose into pipelines. `squares(range(6))` yields `0, 1, 4, 9, 16, 25`. That generator object is passed to `evens(...)`, which filters to only even numbers. Together they lazily transform and filter data without creating intermediate lists.
        sol: |-
          def squares(nums):
              for n in nums:
                  yield n ** 2
          def evens(nums):
              for n in nums:
                  if n % 2 == 0:
                      yield n
          result = []
          for x in evens(squares(range(6))):
              result.append(x)
          print(result)
        start: |-


          result = list(evens(squares(range(6))))
        tests:
