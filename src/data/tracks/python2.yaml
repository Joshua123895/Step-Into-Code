      - name: Inheritance in Dataclasses
        obj: '`@dataclass class Animal:` with `name: str`. `@dataclass class Dog(Animal):` with `breed: str`. `print(Dog("Rex", "Husky"))`.'
        hint: 'Child dataclass inherits all parent fields. Pass parent fields first, then child fields: `Dog("Rex", "Husky")`.'
        expl: |-
          Dataclasses support standard inheritance. The child class (`Dog`) inherits all fields from the parent (`Animal`) and adds its own. The auto-generated `__init__` takes parent fields first, then child fields. `Dog("Rex", "Husky")` sets `name="Rex"` (inherited) and `breed="Husky"` (own), and `__repr__` shows both.
        sol: |-
          from dataclasses import dataclass
