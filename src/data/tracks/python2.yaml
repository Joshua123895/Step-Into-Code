    obj: Import `suppress` from `contextlib` and use it to suppress `FileNotFoundError` when opening a non-existent file.
    hint: '`with suppress(FileNotFoundError):` will not crash if the error occurs.'
    expl: '`contextlib.suppress` is a built-in context manager that suppresses specified exceptions, similar to `pass` on error.'
    sol: "from contextlib import suppress\nwith suppress(FileNotFoundError):\n    with open(\"nope.txt\") as f:\n        print(f.read())\nprint(\"No crash!\")"
