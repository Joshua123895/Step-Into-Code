        obj: 'Import `unittest`. Define `class TestMath(unittest.TestCase):` with `def test_add(self): self.assertEqual(1+1, 2)` and `def test_sub(self): self.assertEqual(5-3, 2)`. Define `def run_tests():` using `loader.loadTestsFromTestCase(TestMath)`, `runner.run(suite)`, `print(result.testsRun)`. Call `run_tests()`.'
        hint: '`loader = unittest.TestLoader(); suite = loader.loadTestsFromTestCase(TestMath); runner = unittest.TextTestRunner(verbosity=0); result = runner.run(suite); print(result.testsRun)`'
        expl: |-
          `unittest` is Python's built-in test framework. `TestLoader().loadTestsFromTestCase(ClassName)` finds all methods starting with `test_` in a `unittest.TestCase` subclass. `TextTestRunner` runs them and returns a result with `.testsRun` telling you how many executed. Use `self.assertEqual()` instead of bare `assert` for better failure messages.
        sol: |-
          import unittest
          class TestMath(unittest.TestCase):
              def test_add(self):
                  self.assertEqual(1 + 1, 2)
              def test_sub(self):
                  self.assertEqual(5 - 3, 2)
          def run_tests():
              loader = unittest.TestLoader()
              suite = loader.loadTestsFromTestCase(TestMath)
              runner = unittest.TextTestRunner(verbosity=0)
              result = runner.run(suite)
              print(result.testsRun)
