            ['11', '101', '111']
        sol: |-
          def digit_sum(n):
              return sum(int(d) for d in str(n))
          nums = list(map(int, input().split()))
          sorted_nums = sorted(nums, key=lambda n: digit_sum(n))
          odds = [x for x in sorted_nums if x % 2 == 1]
          result = list(map(lambda x: bin(x)[2:], odds))
          print(result)
