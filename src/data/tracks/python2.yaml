- name: Context Managers
  icon: file
  levels:
  - name: Basic With Statement
    obj: Open `"test.txt"` in write mode using `with` and write `"Hello, Context!"`. Then read it back in read mode and print.
    hint: Use `with open("test.txt", "w") as f:` and then a separate `with open("test.txt") as f:`.
    expl: The `with` statement ensures resources are properly released when the block exits, even if an error occurs.
    sol: "with open(\"test.txt\", \"w\") as f:\n    f.write(\"Hello, Context!\")\nwith open(\"test.txt\") as f:\n    print(f.read())"
    tests:
    - 'Hello, Context!

