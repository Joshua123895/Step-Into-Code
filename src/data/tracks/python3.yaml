      - name: Descriptors
        obj: 'Define `class Positive:` with `__set_name__(self, owner, name)`, `__get__(self, obj, objtype)`, and `__set__(self, obj, value)` that validates `value > 0`. Use it in `class Person:` with `age = Positive()`.'
        hint: 'A descriptor is an object that controls attribute access via `__get__`, `__set__`, `__delete__`. `__set_name__` captures the attribute name.'
        expl: |-
          A descriptor is an object that defines `__get__`, `__set__`, or `__delete__`. When you access `person.age`, Python finds `Positive` (a descriptor) and calls its `__get__`/`__set__`. Descriptors power `@property`, `@classmethod`, and `@staticmethod`.
        sol: |-
          class Positive:
              def __set_name__(self, owner, name):
                  self.name = name
              def __get__(self, obj, objtype=None):
                  return obj.__dict__[self.name]
              def __set__(self, obj, value):
                  if value <= 0:
                      raise ValueError("Must be positive")
                  obj.__dict__[self.name] = value
          class Person:
              age = Positive()
              def __init__(self, age):
                  self.age = age
          p = Person(25)
          print(p.age)
