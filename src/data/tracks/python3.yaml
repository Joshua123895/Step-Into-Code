        hint: 'Classes with abstract methods cannot be instantiated. They must be subclassed and all abstract methods implemented.'
        expl: |-
          An abstract class is a class you cannot instantiate directly. It serves as a template. Subclasses must implement all `@abstractmethod` methods or they too become abstract. `ABC` (Abstract Base Class) marks the class as abstract.
        sol: |-
