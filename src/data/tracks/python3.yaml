      - name: Metaclass Singleton
        obj: 'Define `class SingletonMeta(type):` that stores instances in a dict and returns the same instance on repeated construction. `class Database(metaclass=SingletonMeta): pass`. Verify `Database() is Database()`.'
        hint: 'Override `__call__` in the metaclass to control instance creation. Store instances in `cls._instances`.'
        expl: |-
          Metaclass `__call__` runs when you call the class (`MyClass()`). By overriding it, you control instance creation. The Singleton pattern stores created instances in a dict keyed by class. If the class already has an instance, return it; otherwise create and store.
        sol: |-
          class SingletonMeta(type):
              _instances = {}
              def __call__(cls, *args, **kwargs):
                  if cls not in cls._instances:
                      cls._instances[cls] = super().__call__(*args, **kwargs)
                  return cls._instances[cls]
          class Database(metaclass=SingletonMeta):
              pass
          d1 = Database()
          d2 = Database()
          print(d1 is d2)
        start: ''
