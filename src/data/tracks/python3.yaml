              def __getitem__(self, i):
                  return self.items[i]
              def __iter__(self):
                  return iter(self.items)
              def __contains__(self, x):
                  return x in self.items
          rc = RangeCollection(0, 5)
          print(len(rc))
          print(rc[0])
          for x in rc:
              print(x, end=" ")
