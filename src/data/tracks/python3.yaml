      - name: The Magic Container
        obj: 'Define `class RangeCollection:` implementing `__len__`, `__getitem__`, `__setitem__`, `__iter__`, `__contains__`, `__add__` (concat), and `__repr__`. Backed by a list. Test various operations.'
        example:
          in: []
          out: |
            3
            20
            True
            [10, 20, 30, 40, 50]
        sol: |-
          class RangeCollection:
              def __init__(self, items):
                  self.items = list(items)
              def __len__(self):
                  return len(self.items)
              def __getitem__(self, i):
                  return self.items[i]
              def __setitem__(self, i, v):
                  self.items[i] = v
              def __iter__(self):
                  return iter(self.items)
              def __contains__(self, x):
                  return x in self.items
              def __add__(self, other):
                  return RangeCollection(self.items + other.items)
              def __repr__(self):
                  return repr(self.items)
          a = RangeCollection([10, 20, 30])
          a[1] = 20
          print(len(a))
          print(a[1])
          print(30 in a)
          b = RangeCollection([40, 50])
          print(a + b)
        tests:
          - |
            3
            20
            True
            [10, 20, 30, 40, 50]
        max: 15/1
