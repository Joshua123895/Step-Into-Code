      - name: Subclass Hook
        obj: 'Define `class Shape(ABC):` with `@classmethod def __subclasshook__(cls, subclass):` checking for `area` method. Test `issubclass(Circle, Shape)` without explicit inheritance.'
        hint: '`__subclasshook__` customizes `issubclass()`. Return True if the subclass conforms to the interface (has `area` method).'
        expl: |-
          `__subclasshook__` lets you define custom logic for `issubclass()`. If it returns True, the class is considered a subclass even without explicit inheritance. This is how Protocols work internally. `__subclasshook__` is checked before the normal inheritance chain.
        sol: |-
          from abc import ABC
          class Shape(ABC):
              @classmethod
              def __subclasshook__(cls, subclass):
                  return (hasattr(subclass, "area") and
                          callable(subclass.area))
          class Circle:
              def area(self):
                  return 3.14
          print(issubclass(Circle, Shape))
        start: ''
