            True
        max: 8/1
      - name: Total Ordering
        obj: 'Use `@functools.total_ordering` on `class Person:` with `__init__(self, name, age)`, `__eq__`, and `__lt__`. All other comparisons are auto-generated. Compare two persons with <=.'
        hint: '`@total_ordering` fills in missing comparison methods (`__le__`, `__gt__`, `__ge__`) given `__eq__` and `__lt__`.'
        expl: |-
          `@functools.total_ordering` is a class decorator that generates all rich comparison methods from just `__eq__` and `__lt__`. It saves boilerplate. Define `__eq__` (equality) and `__lt__` (less than), and the decorator fills in `__le__`, `__gt__`, `__ge__`.
        sol: |-
          from functools import total_ordering
          @total_ordering
          class Person:
              def __init__(self, name, age):
                  self.name = name
                  self.age = age
              def __eq__(self, other):
                  return self.age == other.age
              def __lt__(self, other):
                  return self.age < other.age
          print(Person("A", 30) <= Person("B", 25))
          print(Person("A", 30) >= Person("B", 25))
