        obj: 'Define a descriptor `class Field:` that stores values. `class Model:` with `def __init_subclass__(cls):` collecting `Field` descriptors. `class User(Model):` with `name = Field()` and `email = Field()`. Create `User(name="Alice")` and print the fields.'
        example:
