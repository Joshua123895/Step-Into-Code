        hint: '`obj[i]` calls `__getitem__`, `obj[i] = v` calls `__setitem__`.'
        expl: |-
          `__getitem__` enables bracket access `obj[key]`. `__setitem__` enables assignment `obj[key] = value`. These make your class behave like a list or dict. Together they let users interact with your objects using familiar syntax.
        sol: |-
          class SimpleList:
              def __init__(self):
                  self.items = []
              def append(self, v):
                  self.items.append(v)
              def __getitem__(self, i):
                  return self.items[i]
              def __setitem__(self, i, v):
                  self.items[i] = v
