      - name: Iter and Next
        obj: 'Define `class CountDown:` with `__init__(self, n)`, `__iter__(self)` returning `self`, and `__next__(self)` counting down to 0 then raising `StopIteration`. Loop over it.'
        hint: '`__iter__` returns `self`. `__next__` returns the next value or raises `StopIteration`.'
        expl: |-
          `__iter__` returns an iterator object (usually `self`). `__next__` returns the next value each time it's called, and raises `StopIteration` when done. Together they make your class work with `for x in obj:` loops.
        sol: |-
          class CountDown:
              def __init__(self, n):
                  self.n = n
              def __iter__(self):
                  return self
              def __next__(self):
                  if self.n <= 0:
                      raise StopIteration
                  self.n -= 1
                  return self.n + 1
          for x in CountDown(3):
              print(x)
        start: ''
