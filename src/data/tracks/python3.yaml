        obj: 'Define `class Base:` with `def __init_subclass__(cls, **kwargs):` printing `f"Subclass {cls.__name__} created"`. Then define `class Derived(Base): pass`.'
        hint: '`__init_subclass__` is called automatically when a subclass is defined. It receives the new subclass as `cls`.'
        expl: |-
          `__init_subclass__` is called on the parent class whenever a child class is defined. It receives the child class as `cls`. This is useful for validating subclasses, registering them, or automatically adding attributes. Pattern: "when you extend me, this runs."
        sol: |-
          class Base:
              def __init_subclass__(cls, **kwargs):
                  super().__init_subclass__(**kwargs)
                  print(f"Subclass {cls.__name__} created")
          class Derived(Base):
