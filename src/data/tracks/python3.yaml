      - name: The Property Master
        obj: 'Define `class Student:` with `@property` `grade` that returns a letter based on `self.score` (90+="A", 80+="B", 70+="C", 60+="D", else "F"). Include a setter that clamps score to 0-100. Test with valid and invalid scores.'
        example:
          in: []
          out: |
            A
            F
            0
        sol: |-
          class Student:
              def __init__(self, score=0):
                  self.score = score
              @property
              def grade(self):
                  if self.score >= 90: return "A"
                  if self.score >= 80: return "B"
                  if self.score >= 70: return "C"
                  if self.score >= 60: return "D"
                  return "F"
              @grade.setter
              def grade(self, value):
                  pass
              @property
              def score(self):
                  return self._score
              @score.setter
              def score(self, value):
                  self._score = max(0, min(100, value))
          s = Student(95)
          print(s.grade)
          s.score = -10
          print(s.grade)
          print(s.score)
        tests:
          - |
            A
            F
            0
        max: 14/1
