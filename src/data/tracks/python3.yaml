        obj: 'Define `class Multiplier:` with `__init__(self, factor)` and `__call__(self, x)` returning `x * self.factor`. Create `double = Multiplier(2)` and call `double(5)`.'
        hint: '`__call__` makes an instance callable like a function: `obj(args)` executes `__call__`.'
        expl: |-
          `__call__` lets instances be used as functions. `double = Multiplier(2)` creates an instance, and `double(5)` calls `__call__(self, 5)` which returns `5 * 2 = 10`. This is useful for creating function-like objects that retain state.
        sol: |-
          class Multiplier:
              def __init__(self, factor):
                  self.factor = factor
              def __call__(self, x):
                  return x * self.factor
          double = Multiplier(2)
          print(double(5))
          print(double(3))
