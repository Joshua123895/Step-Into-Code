      - name: The Abstract Forge
        obj: 'Define `class Vehicle(ABC):` with `@abstractmethod def max_speed(self) -> int:`. `class Car(Vehicle):` and `class Boat(Vehicle):` each implementing `max_speed`. Use `@runtime_checkable` Protocol `Drivable` with `def drive(self):` and make Car satisfy it.'
        example:
          in: []
          out: |
            200
            40
            Vroom!
        sol: |-
          from abc import ABC, abstractmethod
          from typing import Protocol, runtime_checkable
          class Vehicle(ABC):
              @abstractmethod
              def max_speed(self) -> int:
                  pass
          class Car(Vehicle):
              def max_speed(self) -> int:
                  return 200
              def drive(self):
                  print("Vroom!")
          class Boat(Vehicle):
              def max_speed(self) -> int:
                  return 40
          @runtime_checkable
          class Drivable(Protocol):
              def drive(self): ...
          print(Car().max_speed())
          print(Boat().max_speed())
          car = Car()
          if isinstance(car, Drivable):
              car.drive()
        tests:
          - |
            200
            40
            Vroom!
        max: 15/1
