name: Object-Oriented Programming
slug: oop
icon: oop
desc: Master OOP in Python from defining your first class to metaclasses and design patterns.
difficulty: 2
chapters:
  - name: Classes & Objects
    icon: object
    levels:
      - name: Define a Class
        obj: 'Define an empty `class Dog:` with `pass` inside.'
        hint: 'Write `class Dog:` on one line, then `pass` indented on the next line.'
        expl: |-
          A class is a blueprint for creating objects. The `class` keyword creates a new type. `pass` is a placeholder that does nothing — it fills the body so Python doesn't complain about an empty class.
        sol: |-
          class Dog:
              pass
        start: ''
        tests: []
        max: 3/1
      - name: Create an Instance
        obj: 'Define `class Dog: pass`, then create `dog = Dog()`.'
        hint: 'Write `dog = Dog()` to create an instance by calling the class like a function.'
        expl: |-
          Calling a class `Dog()` creates a new instance (object) of that class. The variable `dog` now holds that instance. You can create as many independent instances as you want.
        sol: |-
          class Dog:
              pass
          dog = Dog()
        start: ''
        tests: []
        max: 4/1
      - name: The Constructor
        obj: 'Add `def __init__(self):` to `Dog` that prints `"A dog is born!"`.'
        hint: '`def __init__(self): print("A dog is born!")` — `__init__` runs automatically on creation.'
        expl: |-
          `__init__` is the constructor method. Python calls it automatically right after creating a new instance. `self` is the newly created instance itself. Code inside `__init__` runs once per object at creation time.
        sol: |-
          class Dog:
              def __init__(self):
                  print("A dog is born!")
          Dog()
        start: ''
        tests:
          - |
            A dog is born!
        max: 5/1
      - name: Instance Attributes
        obj: 'Add `def __init__(self, name):` and store `self.name = name`. Create `Dog("Rex")`.'
        hint: '`self.name = name` inside `__init__` saves the parameter as an instance attribute.'
        expl: |-
          Parameters passed to `Dog("Rex")` go into `__init__`. Assigning `self.name = name` stores the value on the instance, making it accessible later via `dog.name`. Each instance has its own copy.
        sol: |-
          class Dog:
              def __init__(self, name):
                  self.name = name
          dog = Dog("Rex")
        start: ''
        tests: []
        max: 5/1
      - name: Use an Attribute
        obj: 'Create `Dog("Rex")` and `print(dog.name)`.'
        hint: '`dog.name` accesses the attribute stored by `__init__`.'
        expl: |-
          After `self.name = name` stores the value, you read it back with `dog.name`. The dot operator (`.`) accesses attributes on an object. Every instance of Dog has its own `name`.
        sol: |-
          class Dog:
              def __init__(self, name):
                  self.name = name
          dog = Dog("Rex")
          print(dog.name)
        start: |-
          class Dog:
              def __init__(self, name):
                  self.name = name
        tests:
          - |
            Rex
        max: 6/1
      - name: Instance Methods
        obj: 'Add `def bark(self):` that prints `"Woof!"`. Create `Dog("Rex")` and call `dog.bark()`.'
        hint: '`def bark(self): print("Woof!")` — methods always take `self` as the first parameter.'
        expl: |-
          Methods are functions defined inside a class. They always take `self` as the first parameter, which refers to the instance calling the method. Call them with `instance.method()` — Python automatically passes `self`.
        sol: |-
          class Dog:
              def __init__(self, name):
                  self.name = name
              def bark(self):
                  print("Woof!")
          dog = Dog("Rex")
          dog.bark()
        start: ''
        tests:
          - |
            Woof!
        max: 7/1
      - name: Methods with Parameters
        obj: 'Add `def greet(self, other):` that prints `f"{self.name} says hi to {other}"`. Test with `dog.greet("Buddy")`.'
        hint: '`def greet(self, other): print(f"{self.name} says hi to {other}")`'
        expl: |-
          Methods can take extra parameters after `self`. Here `other` is a plain string argument. Inside the method, `self.name` accesses the calling instance's attribute while `other` is the argument passed.
        sol: |-
          class Dog:
              def __init__(self, name):
                  self.name = name
              def greet(self, other):
                  print(f"{self.name} says hi to {other}")
          dog = Dog("Rex")
          dog.greet("Buddy")
        start: ''
        tests:
          - |
            Rex says hi to Buddy
        max: 8/1
      - name: Method Return Values
        obj: 'Define `class Circle:` with `__init__(self, radius)` and `def area(self) -> float:` returning `3.14 * self.radius ** 2`. Print the area.'
        hint: '`return 3.14159 * self.radius ** 2` — use `return` to give a value back to the caller.'
        expl: |-
          Methods can return values using `return`. The caller receives the returned value. Here `area()` computes and returns the circle's area. `print(circle.area())` prints the returned number.
        sol: |-
          class Circle:
              def __init__(self, radius):
                  self.radius = radius
              def area(self):
                  return 3.14159 * self.radius ** 2
          c = Circle(5)
          print(c.area())
        start: ''
        tests:
          - |
            78.53975
        max: 7/1
      - name: Multiple Attributes
        obj: 'Define `class Book:` with `__init__(self, title, author, pages)`. Store all three. Create `Book("1984", "Orwell", 328)` and print its attributes.'
        hint: 'Store each parameter with `self.title = title`, `self.author = author`, `self.pages = pages`.'
        expl: |-
          A class can store any number of attributes. Here we store three: title, author, and pages. Each attribute is independent and accessed with dot notation: `book.title`, `book.author`, `book.pages`.
        sol: |-
          class Book:
              def __init__(self, title, author, pages):
                  self.title = title
                  self.author = author
                  self.pages = pages
          b = Book("1984", "Orwell", 328)
          print(b.title, b.author, b.pages)
        start: ''
        tests:
          - |
            1984 Orwell 328
        max: 7/1
      - name: 'Test: BankAccount'
        obj: 'Define `class BankAccount:` with `__init__(self, owner, balance=0)`, `deposit(self, amount)`, `withdraw(self, amount)`, and `__str__` returning `f"{self.owner}: ${self.balance}"`. Create an account, deposit 100, withdraw 30, print the account.'
        example:
          in: []
          out: |
            Alice: $70
        sol: |-
          class BankAccount:
              def __init__(self, owner, balance=0):
                  self.owner = owner
                  self.balance = balance
              def deposit(self, amount):
                  self.balance += amount
              def withdraw(self, amount):
                  self.balance -= amount
              def __str__(self):
                  return f"{self.owner}: ${self.balance}"
          acc = BankAccount("Alice")
          acc.deposit(100)
          acc.withdraw(30)
          print(acc)
        tests:
          - |
            Alice: $70
        max: 12/1
        start: ''
  - name: Class Mechanics
    icon: mechanism
    levels:
      - name: Class Variables
        obj: 'Add `species = "Canine"` as a class variable in `Dog`. Print `Dog.species` and also access it via an instance.'
        hint: 'Define `species = "Canine"` directly inside the class, outside any method. Access with `Dog.species` or `self.species`.'
        expl: |-
          A class variable is defined directly in the class body, not inside a method. It is shared across all instances. Access it via `ClassName.variable` or `instance.variable`. Changing it via the class affects all instances.
        sol: |-
          class Dog:
              species = "Canine"
              def __init__(self, name):
                  self.name = name
          print(Dog.species)
          d = Dog("Rex")
          print(d.species)
        start: ''
        tests:
          - |
            Canine
            Canine
        max: 7/1
      - name: Class Methods
        obj: 'Add `@classmethod def description(cls):` that returns `"I am a Dog"`. Call `Dog.description()`.'
        hint: '`@classmethod` decorator makes the method receive the class (`cls`) instead of the instance (`self`).'
        expl: |-
          A class method receives the class itself as the first argument (`cls`), not an instance. Use `@classmethod` above the method. Call it on the class directly: `Dog.description()`. Class methods are often used as alternative constructors.
        sol: |-
          class Dog:
              @classmethod
              def description(cls):
                  return "I am a Dog"
          print(Dog.description())
        start: ''
        tests:
          - |
            I am a Dog
        max: 5/1
      - name: Static Methods
        obj: 'Add `@staticmethod def info():` that returns `"Dogs are loyal"`. Call `Dog.info()`.'
        hint: '`@staticmethod` creates a method that takes neither `self` nor `cls` — it is just a function in the class namespace.'
        expl: |-
          A static method is a regular function placed inside a class for organizational purposes. Use `@staticmethod` and omit `self`/`cls`. Call it on the class: `Dog.info()`. It cannot access class or instance data.
        sol: |-
          class Dog:
              @staticmethod
              def info():
                  return "Dogs are loyal"
          print(Dog.info())
        start: ''
        tests:
          - |
            Dogs are loyal
        max: 5/1
      - name: Property Getter
        obj: 'Define `class Circle:` with `radius` and a `@property` called `diameter` that returns `radius * 2`. Print `c.diameter`.'
        hint: '`@property def diameter(self): return self.radius * 2` — access it without parentheses: `c.diameter`.'
        expl: |-
          `@property` turns a method into a read-only computed attribute. You access it without parentheses: `c.diameter` not `c.diameter()`. The value is computed on-the-fly — change `radius` and `diameter` changes too.
        sol: |-
          class Circle:
              def __init__(self, radius):
                  self.radius = radius
              @property
              def diameter(self):
                  return self.radius * 2
          c = Circle(5)
          print(c.diameter)
        start: ''
        tests:
          - |
            10
        max: 7/1
      - name: Property Setter
        obj: 'Add a setter for `diameter` that updates `radius`. Set `c.diameter = 20` and print `c.radius`.'
        hint: '`@diameter.setter def diameter(self, value): self.radius = value / 2`'
        expl: |-
          `@property.setter` lets you assign to a property. When you write `c.diameter = 20`, the setter method runs with `value=20`. It updates `self.radius = 10`. This controls how the attribute is modified.
        sol: |-
          class Circle:
              def __init__(self, radius):
                  self.radius = radius
              @property
              def diameter(self):
                  return self.radius * 2
              @diameter.setter
              def diameter(self, value):
                  self.radius = value / 2
          c = Circle(5)
          c.diameter = 20
          print(c.radius)
        start: ''
        tests:
          - |
            10.0
        max: 9/1
      - name: Name Mangling
        obj: 'Define `class Secret:` with `__secret = "hidden"` and `def reveal(self):` returning `self.__secret`. Access via method but demonstrate direct access fails.'
        hint: '`__secret` (double underscore) triggers name mangling to `_Secret__secret`. Access it via a method.'
        expl: |-
          Double underscore prefix `__attr` triggers name mangling. Python renames it to `_ClassName__attr` internally. This prevents accidental access from outside the class — `obj.__secret` raises AttributeError but `obj._Secret__secret` works.
        sol: |-
          class Secret:
              __secret = "hidden"
              def reveal(self):
                  return self.__secret
          s = Secret()
          print(s.reveal())
        start: ''
        tests:
          - |
            hidden
        max: 6/1
      - name: Slots
        obj: 'Define `class Point:` with `__slots__ = ("x", "y")` and `__init__` assigning both. Create `Point(3, 4)` and print its attributes.'
        hint: '`__slots__ = ("x", "y")` restricts the instance to only those attributes, saving memory.'
        expl: |-
          `__slots__` tells Python to allocate only the named attributes, preventing `__dict__` creation. This saves memory (important for millions of instances) and prevents adding arbitrary attributes. Instances with slots can still use properties and methods.
        sol: |-
          class Point:
              __slots__ = ("x", "y")
              def __init__(self, x, y):
                  self.x = x
                  self.y = y
          p = Point(3, 4)
          print(p.x, p.y)
        start: ''
        tests:
          - |
            3 4
        max: 7/1
      - name: Object Dict
        obj: 'Define `class Person:` with `__init__(self, name, age)`. Create an instance and `print(person.__dict__)`.'
        hint: '`instance.__dict__` returns a dictionary of all instance attributes and their values.'
        expl: |-
          Every instance has a `__dict__` attribute that stores all its instance attributes as a dictionary. `person.__dict__` returns `{"name": "Alice", "age": 30}`. This is how attribute lookup works internally — Python checks `__dict__` first.
        sol: |-
          class Person:
              def __init__(self, name, age):
                  self.name = name
                  self.age = age
          p = Person("Alice", 30)
          print(p.__dict__)
        start: ''
        tests:
          - |
            {'name': 'Alice', 'age': 30}
        max: 6/1
      - name: 'Test: Temperature'
        obj: 'Define `class Temperature:` with `__init__(self, celsius)` and `@property` `fahrenheit` that converts (celsius * 9/5 + 32) plus a setter that converts back. Set to 100 Fahrenheit, print celsius. Then create from 0 celsius, print fahrenheit.'
        example:
          in: []
          out: |
            37.777...
            32.0
        sol: |-
          class Temperature:
              def __init__(self, celsius=0):
                  self._celsius = celsius
              @property
              def celsius(self):
                  return self._celsius
              @celsius.setter
              def celsius(self, value):
                  self._celsius = value
              @property
              def fahrenheit(self):
                  return self._celsius * 9 / 5 + 32
              @fahrenheit.setter
              def fahrenheit(self, value):
                  self._celsius = (value - 32) * 5 / 9
          t = Temperature()
          t.fahrenheit = 100
          print(t.celsius)
          t2 = Temperature(0)
          print(t2.fahrenheit)
        tests:
          - |
            37.77777777777778
            32.0
        max: 14/1
        start: ''
  - name: Inheritance
    icon: inheritance
    levels:
      - name: Basic Inheritance
        obj: 'Define `class Animal:` with `__init__(self, name)` and `class Dog(Animal): pass`. Create `Dog("Rex")` and print its name.'
        hint: '`class Dog(Animal):` — put the parent class in parentheses after the child class name.'
        expl: |-
          Inheritance lets a child class reuse the parent's code. `class Dog(Animal):` means Dog inherits all attributes and methods from Animal. Since `__init__` is not defined in Dog, Python looks up the chain and uses Animal's `__init__`.
        sol: |-
          class Animal:
              def __init__(self, name):
                  self.name = name
          class Dog(Animal):
              pass
          dog = Dog("Rex")
          print(dog.name)
        start: ''
        tests:
          - |
            Rex
        max: 7/1
      - name: Super Init
        obj: 'Define `class Animal:` with `__init__(self, name)` and `class Dog(Animal):` with `__init__(self, name, breed)` calling `super().__init__(name)` and storing `self.breed`.'
        hint: '`super().__init__(name)` calls the parent class constructor. Then set `self.breed = breed`.'
        expl: |-
          `super()` returns a temporary object of the parent class, letting you call its methods. `super().__init__(name)` invokes Animal's constructor to set `self.name`. Then Dog's `__init__` adds `self.breed`. This avoids duplicating parent logic.
        sol: |-
          class Animal:
              def __init__(self, name):
                  self.name = name
          class Dog(Animal):
              def __init__(self, name, breed):
                  super().__init__(name)
                  self.breed = breed
          dog = Dog("Rex", "Husky")
          print(dog.name, dog.breed)
        start: ''
        tests:
          - |
            Rex Husky
        max: 9/1
      - name: Method Overriding
        obj: 'Define `class Animal:` with `def speak(self): print("...")` and `class Dog(Animal):` overriding `speak` to print `"Woof!"`.'
        hint: 'Define a method with the exact same name in the child class. It replaces the parent version.'
        expl: |-
          When a child class defines a method with the same name as the parent, it overrides the parent's version. Calling `dog.speak()` runs Dog's version, not Animal's. This is how polymorphism works — each subclass can provide its own behavior.
        sol: |-
          class Animal:
              def speak(self):
                  print("...")
          class Dog(Animal):
              def speak(self):
                  print("Woof!")
          Dog().speak()
        start: ''
        tests:
          - |
            Woof!
        max: 7/1
      - name: Extending Parent
        obj: 'Define `class Animal:` with `speak(self)` printing `"..."`. `class Dog(Animal):` overriding `speak` to call `super().speak()` then print `"Woof!"`.'
        hint: '`super().speak()` runs the parent version first, then add your own code after.'
        expl: |-
          Overriding doesn't have to replace everything. `super().speak()` calls the parent's `speak` method, and then the child adds its own logic. This pattern is common when extending parent behavior rather than replacing it entirely.
        sol: |-
          class Animal:
              def speak(self):
                  print("...")
          class Dog(Animal):
              def speak(self):
                  super().speak()
                  print("Woof!")
          Dog().speak()
        start: ''
        tests:
          - |
            ...
            Woof!
        max: 8/1
      - name: Isinstance Check
        obj: 'Define `class Animal: pass` and `class Dog(Animal): pass`. Create `d = Dog()`. Print `isinstance(d, Animal)` and `isinstance(d, Dog)`.'
        hint: '`isinstance(obj, Class)` returns True if obj is an instance of Class or any subclass.'
        expl: |-
          `isinstance()` checks whether an object belongs to a class or any of its parent classes. `isinstance(Dog(), Animal)` is True because Dog inherits from Animal. `issubclass(Dog, Animal)` also works for checking inheritance relationships.
        sol: |-
          class Animal:
              pass
          class Dog(Animal):
              pass
          d = Dog()
          print(isinstance(d, Animal))
          print(isinstance(d, Dog))
        start: ''
        tests:
          - |
            True
            True
        max: 7/1
      - name: Multiple Inheritance
        obj: 'Define `class Flyer:` with `def fly(self): print("Flying")`, `class Swimmer:` with `def swim(self): print("Swimming")`, and `class Duck(Flyer, Swimmer): pass`. Call both methods.'
        hint: '`class Duck(Flyer, Swimmer):` — list multiple parents in parentheses. Duck inherits methods from both.'
        expl: |-
          Python supports multiple inheritance — a class can inherit from several parent classes. `Duck(Flyer, Swimmer)` inherits `fly()` from Flyer and `swim()` from Swimmer. Method lookup goes left-to-right, then up the hierarchy (MRO).
        sol: |-
          class Flyer:
              def fly(self):
                  print("Flying")
          class Swimmer:
              def swim(self):
                  print("Swimming")
          class Duck(Flyer, Swimmer):
              pass
          d = Duck()
          d.fly()
          d.swim()
        start: ''
        tests:
          - |
            Flying
            Swimming
        max: 8/1
      - name: MRO
        obj: 'Define `class A: pass`, `class B(A): pass`, `class C(A): pass`, `class D(B, C): pass`. Print `D.__mro__`.'
        hint: '`ClassName.__mro__` shows the method resolution order as a tuple of classes.'
        expl: |-
          MRO (Method Resolution Order) determines which class's method is called first. Python uses C3 linearization. `D.__mro__` shows `(D, B, C, A, object)`. D inherits from B and C; B and C both inherit from A. MRO ensures each class is visited only once.
        sol: |-
          class A:
              pass
          class B(A):
              pass
          class C(A):
              pass
          class D(B, C):
              pass
          print(D.__mro__)
        start: ''
        tests:
          - |
            (<class 'D'>, <class 'B'>, <class 'C'>, <class 'A'>, <class 'object'>)
        max: 7/1
      - name: Mixins
        obj: 'Define mixins `JSONMixin` with `to_json(self)` and `LogMixin` with `log(self)`. Create `class User(JSONMixin, LogMixin):` with `__init__(self, name)`. Call both methods.'
        hint: 'Mixins are small classes that add specific reusable behavior. Combine them via multiple inheritance.'
        expl: |-
          A mixin is a class that provides reusable methods intended to be combined with other classes. Mixins are not meant to stand alone — they add focused behavior. `JSONMixin` adds serialization, `LogMixin` adds logging. Combine several mixins for rich functionality.
        sol: |-
          class JSONMixin:
              def to_json(self):
                  return f'{{"name": "{self.name}"}}'
          class LogMixin:
              def log(self):
                  print(f"Log: {self.name}")
          class User(JSONMixin, LogMixin):
              def __init__(self, name):
                  self.name = name
          u = User("Alice")
          print(u.to_json())
          u.log()
        start: ''
        tests:
          - |
            {"name": "Alice"}
            Log: Alice
        max: 11/1
      - name: 'Test: Shape Hierarchy'
        obj: 'Define `class Shape:` with `area(self)` raising `NotImplementedError`. `class Circle(Shape):` with `__init__(self, radius)` and `area` returning `pi * r**2`. `class Rectangle(Shape):` with `__init__(self, w, h)` and `area` returning `w * h`. Create both and print their areas.'
        example:
          in: []
          out: |
            78.53981633974483
            24
        sol: |-
          import math
          class Shape:
              def area(self):
                  raise NotImplementedError
          class Circle(Shape):
              def __init__(self, radius):
                  self.radius = radius
              def area(self):
                  return math.pi * self.radius ** 2
          class Rectangle(Shape):
              def __init__(self, w, h):
                  self.w = w
                  self.h = h
              def area(self):
                  return self.w * self.h
          print(Circle(5).area())
          print(Rectangle(4, 6).area())
        tests:
          - |
            78.53981633974483
            24
        max: 12/1
        start: ''
  - name: Dunder Methods
    icon: magic
    levels:
      - name: Str and Repr
        obj: 'Define `class Person:` with `__init__(self, name, age)`, `__str__` returning `f"{self.name} ({self.age})"`, and `__repr__` returning `f"Person({self.name!r}, {self.age})"`. Print the instance.'
        hint: '`__str__` is for display to users, `__repr__` is for developers/debugging. Return strings from both.'
        expl: |-
          `__str__` is called by `print()` and `str()` — it should be human-readable. `__repr__` is called in the REPL and debugger — it should be unambiguous and ideally show how to recreate the object. `print(obj)` uses `__str__`; `repr(obj)` uses `__repr__`.
        sol: |-
          class Person:
              def __init__(self, name, age):
                  self.name = name
                  self.age = age
              def __str__(self):
                  return f"{self.name} ({self.age})"
              def __repr__(self):
                  return f"Person({self.name!r}, {self.age})"
          p = Person("Alice", 30)
          print(p)
          print(repr(p))
        start: ''
        tests:
          - |
            Alice (30)
            Person('Alice', 30)
        max: 9/1
      - name: Equality and Hash
        obj: 'Define `class Point:` with `__init__(self, x, y)`, `__eq__(self, other)` comparing both coordinates, and `__hash__(self)` returning `hash((self.x, self.y))`. Test equality and set membership.'
        hint: '`__eq__` returns True/False. `__hash__` must return an int. Equal objects must have the same hash.'
        expl: |-
          `__eq__` defines what "equal" means for custom objects. `__hash__` makes objects usable in sets and as dict keys. Rule: if `a == b` then `hash(a) == hash(b)`. Use `hash((self.x, self.y))` to combine fields into a hash.
        sol: |-
          class Point:
              def __init__(self, x, y):
                  self.x = x
                  self.y = y
              def __eq__(self, other):
                  return self.x == other.x and self.y == other.y
              def __hash__(self):
                  return hash((self.x, self.y))
          p1 = Point(1, 2)
          p2 = Point(1, 2)
          print(p1 == p2)
          print(len({p1, p2}))
        start: ''
        tests:
          - |
            True
            1
        max: 10/1
      - name: Comparison Methods
        obj: 'Define `class Score:` with `__init__(self, value)`, `__lt__`, `__le__`, `__gt__`, `__ge__` comparing `self.value` to `other.value`. Test with `Score(5) < Score(10)`.'
        hint: '`def __lt__(self, other): return self.value < other.value` — implement all four for full comparison support.'
        expl: |-
          `__lt__` (<), `__le__` (<=), `__gt__` (>), `__ge__` (>=) let you use comparison operators on custom objects. Implement at least `__lt__` and `__eq__`, then use `@functools.total_ordering` to fill in the rest automatically.
        sol: |-
          class Score:
              def __init__(self, value):
                  self.value = value
              def __lt__(self, other):
                  return self.value < other.value
              def __le__(self, other):
                  return self.value <= other.value
              def __gt__(self, other):
                  return self.value > other.value
              def __ge__(self, other):
                  return self.value >= other.value
          print(Score(5) < Score(10))
