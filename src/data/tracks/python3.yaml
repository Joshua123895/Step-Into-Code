      - name: The Diamond of Death
        obj: 'Define `class A:` with `def m(self): print("A")`. `class B(A):` overriding `m` to print "B" and call `super().m()`. `class C(A):` overriding `m` to print "C" and call `super().m()`. `class D(B, C):` overriding `m` to print "D" and call `super().m()`. Call `D().m()` and show the MRO.'
        example:
