      - name: Metaclass Basics
        obj: 'Define `class Meta(type):` that prints `f"Creating class {name}"` in `__new__`. Then define `class MyClass(metaclass=Meta): pass`.'
        hint: 'A metaclass is the class of a class. `type` is the default metaclass. Custom metaclasses inherit from `type`.'
        expl: |-
          A metaclass is a class that creates classes. Just as a class creates instances, a metaclass creates classes. `type` is the built-in metaclass. Custom metaclasses inherit from `type` and override `__new__` to intercept class creation. They run at class definition time.
        sol: |-
          class Meta(type):
              def __new__(mcs, name, bases, namespace):
                  print(f"Creating class {name}")
                  return super().__new__(mcs, name, bases, namespace)
          class MyClass(metaclass=Meta):
              pass
