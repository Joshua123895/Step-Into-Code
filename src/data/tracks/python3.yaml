        hint: 'Implement the abstract method with the exact same signature. Missing it raises TypeError at instantiation time.'
        expl: |-
          A concrete subclass must implement every abstract method from its parent. `Circle(Shape)` provides `area()` so it can be instantiated. If it didn't, Python would refuse to create the object. This enforces a contract.
        sol: |-
          from abc import ABC, abstractmethod
          class Shape(ABC):
              @abstractmethod
              def area(self):
