        hint: '`__len__` is called by `len()`. `__bool__` is called by `if obj:`. If `__bool__` is not defined, Python uses `__len__` (0=False, nonzero=True).'
        expl: |-
          `__len__` enables `len(obj)`. `__bool__` controls truthiness in `if obj:` and `bool(obj)`. If `__bool__` is not defined, Python falls back to `__len__`: 0 is falsy, anything else is truthy. Here an empty team is falsy.
