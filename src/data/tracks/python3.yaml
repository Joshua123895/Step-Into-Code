      - name: Property as Descriptor
        obj: 'Create a descriptor `class Celsius:` with `__get__` returning the value and `__set__` converting Fahrenheit to Celsius. Use it in a class. Show how `property()` works similarly.'
        hint: '`property()` is a built-in descriptor. Your custom descriptor works the same way — intercepting `obj.attr` access.'
        expl: |-
          `property()` is implemented as a descriptor. Understanding descriptors demystifies properties. Here `Celsius` is a custom descriptor that could convert units on assignment. Every time you use `@property`, Python creates a descriptor behind the scenes.
        sol: |-
          class Celsius:
              def __set_name__(self, owner, name):
                  self.name = name
              def __get__(self, obj, objtype=None):
                  if obj is None:
                      return self
                  return obj.__dict__.get(self.name, 0)
              def __set__(self, obj, value):
                  obj.__dict__[self.name] = value
          class Temperature:
              temp = Celsius()
              def __init__(self, temp):
                  self.temp = temp
          t = Temperature(100)
          print(t.temp)
