      - name: Context Manager
        obj: 'Define `class ManagedFile:` with `__enter__(self)` printing "Open" and `__exit__(self, *args)` printing "Close". Use it with `with`.'
        hint: '`__enter__` runs when entering `with` block. `__exit__` runs when leaving (even on exceptions). It receives `(exc_type, exc_val, exc_tb)`.'
        expl: |-
          `__enter__` sets up the resource and returns it (here the object itself). `__exit__` cleans up when the `with` block ends, even if an exception occurred. Parameters of `__exit__` are `(exc_type, exc_val, exc_tb)` — all None if no error.
        sol: |-
          class ManagedFile:
              def __enter__(self):
                  print("Open")
                  return self
              def __exit__(self, *args):
                  print("Close")
          with ManagedFile():
              print("Working")
