      - name: The Class Architect
        obj: 'Define `class Building:` with `__init__(self, name, floors)` and `class Office(Building):` adding `companies` list. Include `add_company(self, name)` and `__str__`. Create an office building and print it.'
        example:
          in: []
          out: |
            Tower: 10 floors, 2 companies
        sol: |-
          class Building:
              def __init__(self, name, floors):
                  self.name = name
                  self.floors = floors
          class Office(Building):
              def __init__(self, name, floors):
                  super().__init__(name, floors)
                  self.companies = []
              def add_company(self, name):
                  self.companies.append(name)
              def __str__(self):
                  return f"{self.name}: {self.floors} floors, {len(self.companies)} companies"
          b = Office("Tower", 10)
          b.add_company("Acme")
          b.add_company("Globex")
          print(b)
        tests:
