      - name: Observer
        obj: 'Define `class Subject:` with `attach(self, observer)` and `notify(self)` calling `observer.update(self)`. `class Observer:` with `update(self, subject)` printing "Updated". Test the notification.'
        hint: 'Observers register with a subject. When the subject changes, it calls all observers. This is publish/subscribe.'
        expl: |-
          The Observer pattern defines a one-to-many dependency. When the subject changes state, all its dependents (observers) are notified automatically. `attach()` adds an observer, `notify()` loops through all observers calling their `update()` method.
        sol: |-
          class Subject:
              def __init__(self):
                  self._observers = []
              def attach(self, observer):
                  self._observers.append(observer)
              def notify(self):
                  for obs in self._observers:
                      obs.update(self)
          class Observer:
              def update(self, subject):
                  print("Updated")
          sub = Subject()
          sub.attach(Observer())
          sub.attach(Observer())
          sub.notify()
        start: ''
        tests:
          - |
            Updated
            Updated
        max: 12/1
      - name: Strategy
        obj: 'Define `class Strategy:` with `@abstractmethod def execute(self, a, b)`. `class Add(Strategy):` and `class Multiply(Strategy):`. `class Context:` that takes a Strategy and calls it. Test both strategies.'
        hint: 'Strategy pattern lets you swap algorithms at runtime. Each strategy is a class with a common interface.'
        expl: |-
          The Strategy pattern defines a family of interchangeable algorithms. Each strategy implements the same interface. The context uses a strategy without knowing the concrete implementation. You can swap strategies at runtime — `Context(Add())` vs `Context(Multiply())`.
        sol: |-
          from abc import ABC, abstractmethod
          class Strategy(ABC):
              @abstractmethod
              def execute(self, a, b): pass
          class Add(Strategy):
              def execute(self, a, b):
                  return a + b
          class Multiply(Strategy):
              def execute(self, a, b):
                  return a * b
          class Context:
              def __init__(self, strategy):
                  self.strategy = strategy
              def run(self, a, b):
                  return self.strategy.execute(a, b)
          print(Context(Add()).run(3, 4))
          print(Context(Multiply()).run(3, 4))
        start: ''
        tests:
          - |
            7
            12
        max: 13/1
      - name: Decorator Pattern
        obj: 'Define `class Coffee:` with `cost(self)` returning 5. `class MilkDecorator:` wrapping a coffee and adding 2 to cost. `class SugarDecorator:` adding 1. Chain them.'
        hint: 'Decorator pattern wraps an object to add behavior. Each decorator takes a component and extends its methods.'
        expl: |-
          The Decorator pattern dynamically adds behavior by wrapping objects. `MilkDecorator` takes a `Coffee` object and overrides `cost()` to add 2. `SugarDecorator` adds 1. Chain them: `SugarDecorator(MilkDecorator(Coffee()))` stacks the costs: 5 + 2 + 1 = 8.
        sol: |-
          class Coffee:
              def cost(self):
                  return 5
          class MilkDecorator:
              def __init__(self, component):
                  self.component = component
              def cost(self):
                  return self.component.cost() + 2
          class SugarDecorator:
              def __init__(self, component):
                  self.component = component
              def cost(self):
                  return self.component.cost() + 1
          coffee = SugarDecorator(MilkDecorator(Coffee()))
          print(coffee.cost())
        start: ''
        tests:
          - |
            8
        max: 13/1
      - name: Adapter
        obj: 'Define `class EuropeanSocket:` with `voltage()` returning 230. `class USAdapter:` wrapping it and `voltage()` returning 120. Make a `class USDevice:` that works with 120V.'
        hint: 'Adapter converts one interface to another that the client expects. Wrap the incompatible object.'
        expl: |-
          The Adapter pattern lets incompatible classes work together. `USAdapter` wraps `EuropeanSocket` and converts its voltage from 230 to 120. The client (`USDevice`) receives the expected interface. The adapter translates calls between the two.
        sol: |-
          class EuropeanSocket:
              def voltage(self):
                  return 230
          class USAdapter:
              def __init__(self, socket):
                  self.socket = socket
              def voltage(self):
                  return self.socket.voltage() // 2
          class USDevice:
              def __init__(self, adapter):
                  self.adapter = adapter
              def plug_in(self):
                  return f"Running at {self.adapter.voltage()}V"
          adapter = USAdapter(EuropeanSocket())
          device = USDevice(adapter)
          print(device.plug_in())
        start: ''
        tests:
          - |
            Running at 115V
        max: 12/1
      - name: Composite
        obj: 'Define `class Component:` with `@abstractmethod def operation(self)`. `class Leaf(Component):` returning "Leaf". `class Composite(Component):` with children list, `add`, `remove`, and `operation` collecting all children results. Build a tree and display.'
        hint: 'Composite lets you treat individual objects and compositions uniformly. `operation()` on a Composite calls it on all children.'
        expl: |-
          The Composite pattern composes objects into tree structures. `Leaf` is a single object. `Composite` can contain both Leaf and other Composite objects. Calling `operation()` on a Composite iterates through children and aggregates results. This enables recursive tree processing.
        sol: |-
          from abc import ABC, abstractmethod
          class Component(ABC):
              @abstractmethod
              def operation(self): pass
          class Leaf(Component):
              def operation(self):
                  return "Leaf"
          class Composite(Component):
              def __init__(self):
                  self.children = []
              def add(self, c):
                  self.children.append(c)
              def operation(self):
                  return " + ".join(c.operation() for c in self.children)
          tree = Composite()
          tree.add(Leaf())
          branch = Composite()
          branch.add(Leaf())
          branch.add(Leaf())
          tree.add(branch)
          print(tree.operation())
        start: ''
        tests:
          - |
            Leaf + Leaf + Leaf
        max: 14/1
      - name: Template Method
        obj: 'Define `class DataProcessor:` with `def process(self):` calling `load()`, `transform()`, `save()` (abstract). `class CSVProcessor:` implementing the three steps. `process()` orchestrates the algorithm.'
        hint: 'Template Method defines the skeleton of an algorithm in a base class. Subclasses implement the steps without changing the structure.'
        expl: |-
          Template Method defines the algorithm structure in a base class method. The steps (abstract methods) are implemented by subclasses. `process()` calls `load()`, `transform()`, `save()` in order. Subclasses fill in the details while the overall flow stays fixed.
        sol: |-
          from abc import ABC, abstractmethod
          class DataProcessor(ABC):
              def process(self):
                  self.load()
                  self.transform()
                  self.save()
              @abstractmethod
              def load(self): pass
              @abstractmethod
              def transform(self): pass
              @abstractmethod
              def save(self): pass
          class CSVProcessor(DataProcessor):
              def load(self):
                  print("Loading CSV")
              def transform(self):
                  print("Transforming data")
              def save(self):
                  print("Saving output")
          CSVProcessor().process()
        start: ''
        tests:
          - |
            Loading CSV
            Transforming data
            Saving output
        max: 13/1
      - name: 'Test: Notification System'
        obj: 'Build a notification system using multiple patterns. Define `class Notification:` with `send(self, msg)`. `class EmailNotification(Notification):` printing "Email: {msg}". `class SMSNotification(Notification):` printing "SMS: {msg}". `class Notifier:` that holds a list of Notification strategies and a `send_all(self, msg)` method. Use the Strategy pattern. Test with both notification types.'
        example:
          in: []
          out: |
            Email: Hello
            SMS: Hello
        sol: |-
          class Notification:
              def send(self, msg):
                  pass
          class EmailNotification(Notification):
              def send(self, msg):
                  print(f"Email: {msg}")
          class SMSNotification(Notification):
              def send(self, msg):
                  print(f"SMS: {msg}")
          class Notifier:
              def __init__(self):
                  self.channels = []
              def add(self, channel):
                  self.channels.append(channel)
              def send_all(self, msg):
                  for c in self.channels:
                      c.send(msg)
          notifier = Notifier()
          notifier.add(EmailNotification())
          notifier.add(SMSNotification())
          notifier.send_all("Hello")
        tests:
          - |
            Email: Hello
            SMS: Hello
        max: 14/1
        start: ''
  - name: Challenges
