        expl: |-
          `__new__` is a static method that creates and returns a new instance. It receives the class as first argument. `__init__` then initializes the already-created instance. `__new__` runs first, then `__init__`. Most classes only need `__init__`.
        sol: |-
          class Demo:
              def __new__(cls):
                  print("New")
