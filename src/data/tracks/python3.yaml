      - name: Singleton
        obj: 'Implement `class Logger:` with `_instance = None` and `def __new__(cls):` returning the existing instance or creating one. Verify `Logger() is Logger()`.'
        hint: 'Override `__new__` to control instance creation. Store the single instance as a class variable.'
        expl: |-
          Singleton ensures a class has only one instance. Override `__new__` to check `cls._instance`. If None, create the instance via `super().__new__` and store it. Always return the stored instance. All calls to `Logger()` get the exact same object.
        sol: |-
          class Logger:
              _instance = None
              def __new__(cls):
                  if cls._instance is None:
                      cls._instance = super().__new__(cls)
                  return cls._instance
