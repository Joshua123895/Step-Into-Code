        obj: 'Define `from typing import Protocol`. Create `class Drawable(Protocol):` with `def draw(self) -> str: ...`. Then `def render(obj: Drawable): print(obj.draw())`. Create a class that satisfies the protocol without explicit inheritance.'
        hint: 'Protocols use structural subtyping — if a class has the right methods, it satisfies the protocol without inheriting.'
        expl: |-
          Protocols are "duck typing" interfaces. A class satisfies a Protocol if it has all the methods/attributes with matching signatures — no explicit inheritance needed. This is structural subtyping. Three dots `...` are the method body (placeholder).
        sol: |-
          from typing import Protocol
          class Drawable(Protocol):
