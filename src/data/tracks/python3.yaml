      - name: The Descriptor Gauntlet
        obj: 'Define `class Validated:` descriptor with `__set_name__`, `__get__`, and `__set__` that validates via `validate(self, value)`. `class Positive(Validated):` with `validate` raising if not positive. `class Person:` with `age = Positive()`. Test valid and invalid assignment.'
        example:
          in: []
          out: |
            25
            Caught error
        sol: |-
          class Validated:
              def __set_name__(self, owner, name):
                  self.name = name
              def __get__(self, obj, objtype=None):
                  if obj is None:
                      return self
                  return obj.__dict__.get(self.name)
              def __set__(self, obj, value):
                  self.validate(value)
                  obj.__dict__[self.name] = value
              def validate(self, value):
                  pass
          class Positive(Validated):
              def validate(self, value):
                  if value <= 0:
                      raise ValueError("Must be positive")
          class Person:
              age = Positive()
              def __init__(self, age):
                  self.age = age
          p = Person(25)
          print(p.age)
          try:
              Person(-5)
          except ValueError:
              print("Caught error")
        tests:
          - |
            25
            Caught error
        max: 16/1
        start: ''
      - name: The Singleton Protocol
        obj: 'Create a metaclass `SingletonMeta` that enforces singleton behavior. Then define `class Config(metaclass=SingletonMeta):` with `__init__(self)` printing "Init once". Create two instances — `__init__` should run only once. Print identity comparison.'
        example:
          in: []
          out: |
            Init once
            True
        sol: |-
          class SingletonMeta(type):
              _instances = {}
              def __call__(cls, *args, **kwargs):
                  if cls not in cls._instances:
                      cls._instances[cls] = super().__call__(*args, **kwargs)
                  return cls._instances[cls]
          class Config(metaclass=SingletonMeta):
              def __init__(self):
                  print("Init once")
          a = Config()
          b = Config()
          print(a is b)
        tests:
          - |
            Init once
            True
        max: 10/1
        start: ''
      - name: The Design Master
        obj: 'Implement `class EventSystem:` with `on(self, event, handler)` to register and `emit(self, event, data)` to notify all handlers. Define `class Button:` that emits "click" when `click()` is called. Use the Observer pattern.'
        example:
          in: []
          out: |
            Button was clicked!
            Alert: click event
        sol: |-
          class EventSystem:
              def __init__(self):
                  self.handlers = {}
              def on(self, event, handler):
                  if event not in self.handlers:
                      self.handlers[event] = []
                  self.handlers[event].append(handler)
              def emit(self, event, data):
                  for handler in self.handlers.get(event, []):
                      handler(data)
          class Button:
              def __init__(self):
                  self.events = EventSystem()
              def click(self):
                  self.events.emit("click", "Button was clicked!")
          def handle_click(msg):
              print(msg)
          def alert_click(msg):
              print(f"Alert: click event")
          btn = Button()
          btn.events.on("click", handle_click)
          btn.events.on("click", alert_click)
          btn.click()
        tests:
          - |
            Button was clicked!
            Alert: click event
        max: 18/1
        start: ''
      - name: The Ultimate Challenge
        obj: 'Define `class EntityMeta(type):` that auto-registers all subclasses in `EntityMeta.registry`. Define `class Entity(metaclass=EntityMeta):` with `@abstractmethod def attack(self) -> int:`. `class Player(Entity):` and `class Monster(Entity):`. Create instances and show all registered subclasses have at least one instance.'
        example:
          in: []
          out: |
            Player: 10
            Monster: 8
            2 classes registered
        sol: |-
          class EntityMeta(type):
              registry = {}
              def __new__(mcs, name, bases, namespace):
                  cls = super().__new__(mcs, name, bases, namespace)
                  if name != "Entity":
                      EntityMeta.registry[name] = cls
                  return cls
          from abc import abstractmethod
          class Entity(metaclass=EntityMeta):
              @abstractmethod
              def attack(self) -> int:
                  pass
          class Player(Entity):
              def attack(self) -> int:
                  return 10
          class Monster(Entity):
              def attack(self) -> int:
                  return 8
          p = Player()
          m = Monster()
          print(f"Player: {p.attack()}")
          print(f"Monster: {m.attack()}")
          print(f"{len(EntityMeta.registry)} classes registered")
        tests:
          - |
            Player: 10
            Monster: 8
            2 classes registered
        max: 16/1
        start: ''
