        hint: 'Factory centralizes object creation logic. Based on a parameter, it returns instances of different classes.'
        expl: |-
          The Factory pattern centralizes creation logic. Instead of calling `Dog()` or `Cat()` directly, call `AnimalFactory.create("dog")` which returns the right instance. This decouples the caller from the concrete class. Add new types without changing existing code.
        sol: |-
          class Dog:
              def speak(self):
                  return "Woof!"
          class Cat:
              def speak(self):
                  return "Meow!"
