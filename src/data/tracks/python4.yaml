      - name: Collision Handling
        viz: hash_table
        obj: 'Extend your HashTable so `insert` updates existing keys instead of duplicating. Insert `"a": 1`, then `"a": 2` (update), then `"b": 3`, and print both values.'
        hint: 'Loop over the bucket with `for i, (k, v) in enumerate(bucket):` — `enumerate` hands you both the index `i` and the `(k, v)` pair at that index on every loop turn, which you need because you can''t update a tuple in place, only replace it at its index. If `k == key`, overwrite that slot with `bucket[i] = (key, value)` and `return` right away so the code below doesn''t also run. If the loop finishes with no match, fall through to the existing `bucket.append((key, value))`.'
        expl: 'When a key already exists in the bucket, we should update its value rather than adding a duplicate — otherwise `get` would keep returning the first (now stale) match forever, and the bucket would grow every time you re-insert the same key. Searching before appending ensures each key maps to exactly one value, exactly like a real Python `dict`.'
        sol: |-
          class HashTable:
              def __init__(self, size=10):
                  self.size = size
                  self.buckets = [[] for _ in range(size)]
              def _hash(self, key):
                  return hash(key) % self.size
              def insert(self, key, value):
                  bucket = self.buckets[self._hash(key)]
                  for i, (k, v) in enumerate(bucket):
                      if k == key:
                          bucket[i] = (key, value)
                          return
                  bucket.append((key, value))
              def get(self, key):
                  bucket = self.buckets[self._hash(key)]
                  for k, v in bucket:
                      if k == key:
                          return v
                  return None
          ht = HashTable()
          ht.insert("a", 1); ht.insert("a", 2); ht.insert("b", 3)
          print(ht.get("a"))
          print(ht.get("b"))
        start: |-
          class HashTable:
              def __init__(self, size=10):
                  self.size = size
                  self.buckets = [[] for _ in range(size)]
              def _hash(self, key):
                  return hash(key) % self.size
              def insert(self, key, value):
                  bucket = self.buckets[self._hash(key)]
                  bucket.append((key, value))
              def get(self, key):
                  bucket = self.buckets[self._hash(key)]
                  for k, v in bucket:
                      if k == key:
                          return v
                  return None
