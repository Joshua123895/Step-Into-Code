        viz: tree
        obj: 'Implement `def insert_bst(root, value):` that inserts into a Binary Search Tree. Insert `5`, `3`, `7`, `2`, `8` into an empty BST, then print in-order traversal.'
        hint: 'Base case first: `if not root: return TreeNode(value)` — this is the line that actually creates the new node, and it only runs once you''ve recursed all the way down to an empty spot. Otherwise recurse: `if value < root.value: root.left = insert_bst(root.left, value)`, else the mirror for `root.right`. Always reassign — `root.left = insert_bst(...)`, not just `insert_bst(root.left, value)` on its own — and finish every branch with `return root`.'
        expl: 'A BST maintains the property: all left descendants are smaller, all right descendants are larger. This enables O(log n) average search. The recursion can feel like it does nothing when `root` already exists, since you just reassign `root.left`/`root.right` to themselves and return `root` unchanged — but that reassignment is exactly how the brand-new node (created down at the base case) gets wired back into the tree at every level on the way back up, with no need for parent pointers.'
