        viz: graph
        obj: 'Implement `def dfs(graph, start, visited=None):` that prints nodes in depth-first order (recursive). Use the graph `{0: [1,2], 1: [0,3,4], 2: [0], 3: [1], 4: [1]}` starting from `0`.'
        hint: 'Start with `if visited is None: visited = set()`. You can''t write `def dfs(graph, start, visited=set()):` directly — Python builds that default `set()` exactly once, when the function is defined, and every future call would then share (and keep adding to) that same set instead of getting a fresh one. Using `None` and creating the real `set()` inside the function body avoids that trap. After that: `visited.add(start)`, `print(start)`, then loop over `graph[start]` and recursively call `dfs(graph, neighbor, visited)` for any neighbor not already in `visited`.'
        expl: 'DFS explores as far as possible along each branch before backtracking. It uses a stack implicitly — each recursive call waits for the ones it triggers to finish before returning, which is exactly how a stack unwinds. Passing `visited` through every recursive call (instead of a global) is what lets it be shared across branches so the same node is never printed twice.'
        sol: |-
          def dfs(graph, start, visited=None):
              if visited is None:
                  visited = set()
              visited.add(start)
              print(start)
              for neighbor in graph[start]:
                  if neighbor not in visited:
                      dfs(graph, neighbor, visited)
