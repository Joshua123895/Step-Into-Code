      - name: Queue Challenge
        obj: 'Use `deque` to implement a circular buffer of size `n`. Read `n` and numbers until `-1`, maintaining the last `n` numbers. Print the buffer from front to back.'
        example:
          in:
            - 3
            - 1
            - 2
            - 3
            - 4
            - -1
          out: |
            [2, 3, 4]
        sol: |-
          from collections import deque
          n = int(input())
          buf = deque(maxlen=n)
          while True:
              v = int(input())
              if v == -1:
                  break
              buf.append(v)
          print(list(buf))
        max: 12/1
        tests:
          - in:
              - 3
              - 1
              - 2
              - 3
              - 4
              - -1
            exp: |
              [2, 3, 4]
          - in:
              - 2
              - 10
              - 20
              - 30
              - -1
            exp: |
              [20, 30]
      - name: Hash Table Challenge
        obj: 'Read a line of text. Find and print the first non-repeating character, or `"None"` if all repeat.'
        example:
          in:
            - swiss
          out: |
            w
        sol: |-
          text = input()
          freq = {}
          for ch in text:
              freq[ch] = freq.get(ch, 0) + 1
          for ch in text:
              if freq[ch] == 1:
                  print(ch)
                  break
          else:
              print("None")
        max: 10/1
        tests:
          - in: swiss
            exp: |
              w
          - in: aabbcc
            exp: |
              None
      - name: Tree Challenge
        obj: 'Implement `def is_bst(node, min_val, max_val):` that validates if a tree is a BST. Build tree: `2` (left=`1`, right=`3`) and check it, then build `1` (left=`2`, right=`3`) and check it.'
        example:
          in: []
          out: |
            True
            False
        sol: |-
          class TreeNode:
              def __init__(self, value):
                  self.value = value
                  self.left = None
                  self.right = None
          def is_bst(node, min_val=float("-inf"), max_val=float("inf")):
              if not node:
                  return True
              if not (min_val < node.value < max_val):
                  return False
              return is_bst(node.left, min_val, node.value) and is_bst(node.right, node.value, max_val)
          t1 = TreeNode(2); t1.left = TreeNode(1); t1.right = TreeNode(3)
          t2 = TreeNode(1); t2.left = TreeNode(2); t2.right = TreeNode(3)
          print(is_bst(t1))
          print(is_bst(t2))
        max: 20/1
        tests:
          - |
            True
            False
      - name: Heap Challenge
        obj: 'Read `n` numbers and find the median after each new number using two heaps (a max-heap for the lower half and a min-heap for the upper half). Print each median.'
        example:
          in:
            - 5
            - 2
            - 1
            - 3
            - 7
            - 6
          out: |
            2
            1
            2
            2
            3
        sol: |-
          import heapq
          n = int(input())
          lower = []
          upper = []
          for _ in range(n):
              x = int(input())
              if not lower or x <= -lower[0]:
                  heapq.heappush(lower, -x)
              else:
                  heapq.heappush(upper, x)
              if len(lower) > len(upper) + 1:
                  heapq.heappush(upper, -heapq.heappop(lower))
              elif len(upper) > len(lower):
                  heapq.heappush(lower, -heapq.heappop(upper))
              print(-lower[0])
        max: 20/1
        tests:
          - in:
              - 5
              - 2
              - 1
              - 3
              - 7
              - 6
            exp: |
              2
              1
              2
              2
              3
      - name: Graph Challenge
        obj: 'Read the number of vertices `v` and edges `e`, then `e` pairs representing edges of an undirected graph. Perform DFS from vertex `0` and print the number of reachable vertices (including start).'
        example:
          in:
            - 6
            - 4
            - 0 1
            - 1 2
            - 3 4
            - 4 5
          out: |
            3
        sol: |-
          v = int(input())
          e = int(input())
          graph = {i: [] for i in range(v)}
          for _ in range(e):
              a, b = map(int, input().split())
              graph[a].append(b)
              graph[b].append(a)
          visited = set()
          stack = [0]
          while stack:
              node = stack.pop()
              if node not in visited:
                  visited.add(node)
                  for neighbor in graph[node]:
                      if neighbor not in visited:
                          stack.append(neighbor)
          print(len(visited))
        max: 20/1
        tests:
          - in:
              - 6
              - 4
              - 0 1
              - 1 2
              - 3 4
              - 4 5
            exp: |
              3
          - in:
              - 4
              - 3
              - 0 1
              - 1 2
              - 2 3
            exp: |
              4
      - name: The Ultimate Structure
        obj: 'Read edges of an undirected graph, detect if it contains a cycle using DFS. Print `"Cycle found"` or `"No cycle"`.'
        example:
          in:
            - 4
            - 4
            - 0 1
            - 1 2
            - 2 0
            - 2 3
          out: |
            Cycle found
        sol: |-
          v = int(input())
          e = int(input())
          graph = {i: [] for i in range(v)}
          for _ in range(e):
              a, b = map(int, input().split())
              graph[a].append(b)
              graph[b].append(a)
          visited = set()
          def dfs(node, parent):
              visited.add(node)
              for neighbor in graph[node]:
                  if neighbor not in visited:
                      if dfs(neighbor, node):
                          return True
                  elif neighbor != parent:
                      return True
              return False
          has_cycle = False
          for i in range(v):
              if i not in visited:
                  if dfs(i, -1):
                      has_cycle = True
                      break
          print("Cycle found" if has_cycle else "No cycle")
        max: 25/1
        tests:
          - in:
              - 4
              - 4
              - 0 1
              - 1 2
              - 2 0
              - 2 3
            exp: |
              Cycle found
          - in:
              - 3
              - 2
              - 0 1
              - 1 2
            exp: |
              No cycle