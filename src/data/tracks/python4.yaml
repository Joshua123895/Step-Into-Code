                  self.value = value
                  self.left = None
                  self.right = None
          def insert_bst(root, value):
              if not root:
                  return TreeNode(value)
              if value < root.value:
                  root.left = insert_bst(root.left, value)
              else:
                  root.right = insert_bst(root.right, value)
              return root
