        sol: |-
          class Node:
              def __init__(self, value):
                  self.value = value
                  self.next = None
          def reverse(head):
              prev = None
              current = head
              while current:
                  next_node = current.next
                  current.next = prev
                  prev = current
                  current = next_node
              return prev
          head = Node(1); head.next = Node(2); head.next.next = Node(3); head.next.next.next = Node(4)
