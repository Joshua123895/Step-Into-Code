            - "({[]})"
          out: |
            Balanced
        sol: |-
          def is_balanced(s):
              pairs = {")": "(", "]": "[", "}": "{"}
              stack = []
              for ch in s:
                  if ch in "([{":
                      stack.append(ch)
                  elif ch in ")]}":
                      if not stack or stack.pop() != pairs[ch]:
                          return False
              return len(stack) == 0
          s = input()
          print("Balanced" if is_balanced(s) else "Not balanced")
