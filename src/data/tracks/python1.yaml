name: Python Fundamentals
slug: python
icon: python
desc: 'Master Python from the ground up: variables, loops, functions, and more.'
difficulty: 1
chapters:
  - name: Input & Output
    icon: output
    levels:
      - name: Hello, World!
        hint: 'Try: `print("Hello, World!")`'
        tests:
          - exp: |
              Hello, World!
        id: 1
        max: 2/1
        obj: Use `print()` to display the message `"Hello, World!"`
        expl: '`print()` is a built-in Python function that outputs text to the console. You pass a string inside parentheses.'
        sol: print("Hello, World!")
        start: ''
      - name: Print a Variable
        hint: |-
          Try: `x = 5
          print(x)`
        tests:
          - exp: |
              5
        id: 2
        max: 3/1
        obj: Create a variable `x` with value `5`, then print it.
        expl: A variable stores data in memory. `x = 5` assigns the integer 5 to x. Then `print(x)` outputs its value.
        sol: |-
          x = 5
          print(x)
        start: ''
      - name: Printing Multiple Values
        hint: |-
          Try: `name = "Alex"
          age = 18
          print(name, age)`
        tests:
          - exp: |
              Alex 18
        id: 3
        max: 4/1
        obj: Create variables `name` and `age` with values `"Alex"` and `18`, then print both values.
        expl: You can pass multiple arguments into `print()`. Python separates them with spaces.
        sol: |-
          name = "Alex"
          age = 18
          print(name, age)
        start: ''
      - name: User Input
        hint: 'Try: `name = input("What is your name?")`'
        id: 4
        max: 3/1
        obj: Use `input()` to ask `"What is your name?"` and store the answer in `name`. Then print `f"Hello, {name}!"`.
        expl: '`input()` displays a prompt and waits for the user to type something. The result is returned as text.'
        sol: |-
          name = input()
          print(f"Hello, {name}!")
        start: ''
        tests:
          - in: ["World"]
            exp: |-
              What is your name?World
              Hello, World!
      - name: Echo Machine
        hint: |-
          Try: `text = input()
          print(text)`
        tests:
          - in: Python
            exp: |
              Python
        id: 5
        max: 2/1
        obj: Read a value using `input()` and print it back to the user.
        expl: Data entered by the user can be stored in a variable and displayed later.
        sol: |-
          text = input()
          print(text)
        start: ''
      - name: Formatted Output
        hint: |-
          Try: `age = int(input())
          print(f"I am {age} years old")`
        tests:
          - in: '25'
            exp: |
              I am 25 years old
        id: 6
        max: 3/1
        obj: Read an age, store it in `age`, then print `I am {age} years old` using an f-string.
        expl: An `f-string` lets you insert variables directly inside text using `{}`.
        sol: |-
          age = int(input())
          print(f"I am {age} years old")
        start: ''
      - name: Meet the Traveler
        hint: |-
          Try: `name = input()
          age = int(input())
          print(f"{name} is {age} years old")`
        tests:
          - in:
              - Alex
              - '18'
            exp: |
              Alex is 18 years old
        id: 7
        max: 3/1
        obj: Read a name and age, then print `{name} is {age} years old` using an f-string.
        expl: f-strings can include multiple variables inside the same message.
        sol: |-
          name = input()
          age = int(input())
          print(f"{name} is {age} years old")
        start: ''
      - name: The Adventurer's Passport
        example:
          input:
            - Alice
            - '25'
            - Paris
          output: |
            Name: Alice
            Age: 25
            City: Paris
        tests:
          - in:
              - Alice
              - '20'
              - London
            exp: |
              Name: Alice
              Age: 20
              City: London
          - in:
              - Bob
              - '0'
              - NYC
            exp: |
              Name: Bob
              Age: 0
              City: NYC
        id: 8
        max: 6/1
        obj: 'Read a traveler''s name, age, and city, then print three lines using f-strings:`Name: {name}`, `Age: {age}`, and `City: {city}`.'
        sol: |-
          name = input()
          age = int(input())
          city = input()
          print(f"Name: {name}")
          print(f"Age: {age}")
          print(f"City: {city}")
        start: ''
    id: 1
  - name: Variables & Data Types
    icon: variable
    levels:
      - name: String Variable
        hint: 'Try: `greeting = "Hello"`'
        tests:
          - exp: ''
        id: 9
        max: 2/1
        obj: Create a variable `greeting` with value `"Hello"`.
        expl: A string is a sequence of characters enclosed in quotes. Strings can be stored inside variables.
        sol: greeting = "Hello"
        start: ''
      - name: Integer & Float
        hint: Write both assignments, one per line.
        tests:
          - exp: ''
        id: 10
        max: 3/1
        obj: Create `count = 10` and `price = 19.99`.
        expl: Integers are whole numbers, while floats contain decimal values.
        sol: |-
